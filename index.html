<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xnesto – متجر الألعاب | PS4/PS5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%);
      font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
      color: #f0f0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      background: rgba(17, 17, 51, 0.7);
      backdrop-filter: blur(10px);
      padding: 1.5rem 1rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 204, 255, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #00ccff, #ffaa44);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header p {
      color: #aab3e6;
    }

    /* شريط التحكم */
    .control-bar {
      max-width: 1300px;
      margin: 0 auto 1.8rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px 20px;
      border-radius: 60px;
    }

    .lang-switch {
      display: flex;
      gap: 10px;
      background: #1e1e3a;
      padding: 5px;
      border-radius: 50px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: #ccc;
      font-weight: bold;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .currency-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e1e3a;
      padding: 5px 15px;
      border-radius: 50px;
    }

    #currencySelect {
      background: #0a0c1a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 8px 12px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

    /* أزرار تسجيل الدخول */
    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .login-btn, .logout-btn {
      background: #2d2f6e;
      border: none;
      color: #ffaa66;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .login-btn:hover, .logout-btn:hover {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .user-badge {
      background: #1e1e3a;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-badge i {
      color: #ffaa44;
    }

    /* نافذة تسجيل الدخول */
    .login-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .login-modal.active {
      visibility: visible;
      opacity: 1;
    }

    .login-box {
      background: #11152b;
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      border: 1px solid #ffaa44;
      width: 320px;
    }

    .login-box h3 {
      margin-bottom: 1rem;
      color: #ffaa44;
    }

    .login-box input, .login-box select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 40px;
      border: none;
      background: #1e1e3a;
      color: white;
      text-align: center;
    }

    .login-box button {
      background: #ffaa44;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .login-error {
      color: #ff6666;
      margin-top: 10px;
      font-size: 0.8rem;
    }

    /* لوحة تحكم الادمن */
    .admin-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .admin-panel.active {
      visibility: visible;
      opacity: 1;
    }

    .admin-container {
      background: #0a0c1a;
      border-radius: 1.5rem;
      width: 90%;
      max-width: 1000px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
      border: 2px solid #ffaa44;
    }

    .admin-container h2 {
      text-align: center;
      color: #ffaa44;
      margin-bottom: 1rem;
    }

    .admin-games-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .admin-game-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: #11152b;
      padding: 12px 16px;
      border-radius: 60px;
      gap: 10px;
    }

    .admin-game-name {
      flex: 2;
      font-weight: bold;
      min-width: 150px;
    }

    .admin-price-input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      padding: 8px 12px;
      border-radius: 30px;
      width: 100px;
      text-align: center;
      color: #ffdd99;
    }

    .admin-delete-btn {
      background: #ff4444;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      color: white;
    }

    .admin-save-btn {
      background: #ffaa44;
      border: none;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    /* إضافة لعبة جديدة */
    .add-game-section {
      background: #11152b;
      padding: 1rem;
      border-radius: 1rem;
      margin-top: 1rem;
    }

    .add-game-section h3 {
      color: #ffaa44;
      margin-bottom: 1rem;
    }

    .add-game-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .add-game-form input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      padding: 8px 12px;
      border-radius: 30px;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .add-game-btn {
      background: #00cc88;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    .close-admin {
      background: #ff4444;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 20px auto 0;
    }

    /* ألعاب */
    .games-grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    .game-card {
      background: #11152b;
      border-radius: 1.2rem;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2f55;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: #ffaa55;
    }

    .game-image {
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .game-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #ffcc77;
    }

    .card-info {
      padding: 1rem;
      text-align: center;
    }

    .game-title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .game-version {
      font-size: 0.7rem;
      color: #8f9bcf;
      margin: 5px 0;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #ff6666;
      margin: 8px 0;
    }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25D366;
      color: #000;
      width: 100%;
      padding: 10px 0;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 8px 14px;
      border-radius: 40px;
      cursor: pointer;
    }

    .page-btn.active {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      color: #6f7bb3;
    }

    @media (max-width: 640px) {
      body { padding: 0.8rem; }
      .game-image { height: 160px; }
    }
  </style>
</head>
<body dir="rtl">

<div class="header">
  <h1>🎮 xnesto</h1>
  <p id="welcomeMsg">ألعاب PS4 / PS5 – أسعار محدثة – رصيد شحن فوري</p>
</div>

<div class="control-bar">
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="ar">🇸🇦 العربية</button>
    <button class="lang-btn" data-lang="en">🇬🇧 English</button>
  </div>
  <div class="currency-selector">
    <label><i class="fas fa-coins"></i> العملة:</label>
    <select id="currencySelect">
      <option value="OMR">ريال عماني (OMR)</option>
      <option value="USD">دولار أمريكي (USD)</option>
      <option value="SAR">ريال سعودي (SAR)</option>
      <option value="QAR">ريال قطري (QAR)</option>

</div>

<div class="games-grid" id="gamesContainer"></div>
<div class="pagination" id="paginationContainer"></div>

<div class="footer">
  <i class="fas fa-gamepad"></i> xnesto - جميع الحقوق محفوظة

<!-- نافذة تسجيل الدخول -->
<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h3><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h3>
    <select id="userTypeSelect">
      <option value="user">👤 عميل / زائر</option>
      <option value="admin">👑 أدمن (مدير)</option>
    </select>
    <div id="adminPasswordField" style="display:none;">
      <input type="password" id="adminPassword" placeholder="كلمة السر" autocomplete="off">
    </div>
    <button id="loginSubmitBtn">دخول</button>
    <div class="login-error" id="loginError"></div>
    <button id="closeLoginBtn" style="background:#444; margin-top:10px;">إغلاق</button>
  </div>
</div>

<!-- لوحة تحكم الادمن -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-container">
    <h2><i class="fas fa-edit"></i> لوحة تحكم الأدمن</h2>
    <div class="admin-games-list" id="adminGamesList"></div>
    
    <div class="add-game-section">
      <h3><i class="fas fa-plus-circle"></i> إضافة لعبة جديدة</h3>
      <div class="add-game-form">
        <input type="text" id="newGameNameAr" placeholder="الاسم بالعربية">
        <input type="text" id="newGameNameEn" placeholder="Name in English">
        <input type="text" id="newGameVersion" placeholder="الإصدار (PS5/PS4)">
        <input type="number" id="newGamePrice" placeholder="السعر (ر.ع)">
        <input type="text" id="newGameImage" placeholder="رابط الصورة">
        <button class="add-game-btn" id="addGameBtn"><i class="fas fa-save"></i> إضافة</button>
      </div>
    </div>
    
    <button class="close-admin" id="closeAdminBtn">إغلاق</button>
  </div>
</div>

<script>
  // ==================== قائمة الألعاب الافتراضية ====================
  let gamesData = [
    { id: 1, nameAr: "Assassin's Creed Shadows", nameEn: "Assassin's Creed Shadows", version: "PS5/PS4", priceOMR: 14, image: "https://image.api.playstation.com/vulcan/ap/rnd/202410/0212/9e7f8c2a3b5d4e6f7a8b9c0d1e2f3a4b.png?w=600", fallback: "https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/3159340/header.jpg", msgAr: "أريد Assassin's Creed Shadows", msgEn: "I want Assassin's Creed Shadows" },
    { id: 2, nameAr: "Call of Duty: Black Ops 6", nameEn: "Call of Duty: Black Ops 6", version: "PS5/PS4", priceOMR: 22, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2933620/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202406/1211/7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d.png?w=600", msgAr: "أريد Call of Duty Black Ops 6", msgEn: "I want Call of Duty Black Ops 6" },
    { id: 3, nameAr: "Grand Theft Auto VI", nameEn: "Grand Theft Auto VI", version: "PS5", priceOMR: 6, image: "https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/downloads/gtavi/gtavi_cover_ps5.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202502/1912/2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e.png?w=600", msgAr: "أريد GTA VI PS5", msgEn: "I want GTA VI PS5" },
    { id: 4, nameAr: "Grand Theft Auto VI", nameEn: "Grand Theft Auto VI", version: "PS4", priceOMR: 5, image: "https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/downloads/gtavi/gtavi_cover.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202502/1912/1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d.png?w=600", msgAr: "أريد GTA VI PS4", msgEn: "I want GTA VI PS4" },
    { id: 5, nameAr: "Monster Hunter Wilds", nameEn: "Monster Hunter Wilds", version: "PS5", priceOMR: 14, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2246340/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202312/0715/4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a.png?w=600", msgAr: "أريد Monster Hunter Wilds", msgEn: "I want Monster Hunter Wilds" },
    { id: 6, nameAr: "Ghost of Yōtei", nameEn: "Ghost of Yōtei", version: "PS5", priceOMR: 14, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3138540/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202409/1810/5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c.png?w=600", msgAr: "أريد Ghost of Yōtei", msgEn: "I want Ghost of Yōtei" },
    { id: 7, nameAr: "Death Stranding 2", nameEn: "Death Stranding 2", version: "PS5", priceOMR: 24, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2859570/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202402/0715/5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b.png?w=600", msgAr: "أريد Death Stranding 2", msgEn: "I want Death Stranding 2" },
    { id: 8, nameAr: "EA Sports FC 26", nameEn: "EA Sports FC 26", version: "PS4/PS5", priceOMR: 13, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2668610/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202507/1512/8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e.png?w=600", msgAr: "أريد EA Sports FC 26", msgEn: "I want EA Sports FC 26" },
    { id: 9, nameAr: "Black Myth: Wukong", nameEn: "Black Myth: Wukong", version: "PS5", priceOMR: 16, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2358720/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202405/2115/9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f.png?w=600", msgAr: "أريد Black Myth Wukong", msgEn: "I want Black Myth Wukong" },
    { id: 10, nameAr: "Silent Hill 2 Remake", nameEn: "Silent Hill 2 Remake", version: "PS5", priceOMR: 14, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2124490/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202210/1814/3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f.png?w=600", msgAr: "أريد Silent Hill 2 Remake", msgEn: "I want Silent Hill 2 Remake" },
    { id: 11, nameAr: "God of War Ragnarök", nameEn: "God of War Ragnarök", version: "PS4/PS5", priceOMR: 10, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2322010/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202207/1210/6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c.png?w=600", msgAr: "أريد God of War Ragnarök", msgEn: "I want God of War Ragnarök" },
    { id: 12, nameAr: "Marvel's Spider-Man 2", nameEn: "Marvel's Spider-Man 2", version: "PS5", priceOMR: 16, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2651280/header.jpg", fallback: "https://image.api.playstation.com/vulcan/ap/rnd/202305/1210/7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d.png?w=600", msgAr: "أريد Spider-Man 2", msgEn: "I want Spider-Man 2" }
  ];

  let nextId = 13;
  let currentUser = { type: "guest", name: "زائر" };
  let currentLang = "ar";
  let currentCurrency = "OMR";
  let currentPage = 1;
  const GAMES_PER_PAGE = 8;
  const ADMIN_PASSWORD = "admin123";

  const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, QAR: 9.46, EUR: 2.4, AED: 9.55 };
  const currencySymbols = { OMR: "ر.ع", USD: "$", SAR: "ر.س", QAR: "ر.ق", EUR: "€", AED: "د.إ" };
  const WA_NUMBER = "96879977100";

  function saveGamesToLocal() { localStorage.setItem("xnesto_games", JSON.stringify(gamesData)); }
  function loadGamesFromLocal() {
    const saved = localStorage.getItem("xnesto_games");
    if (saved) { gamesData = JSON.parse(saved); nextId = Math.max(...gamesData.map(g => g.id), 0) + 1; }
  }
  loadGamesFromLocal();

  function convertPrice(price, currency) {
    let converted = price * exchangeRates[currency];
    return converted.toFixed(2);
  }

  function buildGameCard(game) {
    const card = document.createElement("div");
    card.className = "game-card";
    const gameName = currentLang === "ar" ? game.nameAr : game.nameEn;
    const whatsappMsg = currentLang === "ar" ? game.msgAr : game.msgEn;
    const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(whatsappMsg)}`;
    const convertedPrice = convertPrice(game.priceOMR, currentCurrency);
    const currencySym = currencySymbols[currentCurrency];
    
    card.innerHTML = `
      <div class="game-image" style="background-image: url('${game.image}');">
        <div class="game-badge">${game.version}</div>
      </div>
      <div class="card-info">
        <div class="game-title">${gameName}</div>
        <div class="game-version">${currentLang === "ar" ? "نسخة رقمية | تحميل فوري" : "Digital Edition"}</div>
        <div class="price">${convertedPrice} <span>${currencySym}</span></div>
        <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${currentLang === "ar" ? "اطلب الآن" : "Order Now"}</a>
      </div>
    `;
    return card;
  }

  function renderGames() {
    const container = document.getElementById("gamesContainer");
    if (!container) return;
    container.innerHTML = "";
    const start = (currentPage - 1) * GAMES_PER_PAGE;
    const pageGames = gamesData.slice(start, start + GAMES_PER_PAGE);
    pageGames.forEach(game => container.appendChild(buildGameCard(game)));
    renderPagination();
  }

  function renderPagination() {
    const pagContainer = document.getElementById("paginationContainer");
    if (!pagContainer) return;
    pagContainer.innerHTML = "";
    const totalPages = Math.ceil(gamesData.length / GAMES_PER_PAGE);
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === currentPage ? " active" : "");
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; renderGames(); };
      pagContainer.appendChild(btn);
    }
  }

  function renderAdminPanel() {
    const container = document.getElementById("adminGamesList");
    if (!container) return;
    container.innerHTML = "";
    gamesData.forEach(game => {
      const item = document.createElement("div");
      item.className = "admin-game-item";
      item.innerHTML = `
        <div class="admin-game-name">${game.nameAr} (${game.version})</div>
        <input type="number" class="admin-price-input" id="price-${game.id}" value="${game.priceOMR}" step="0.5">
        <button class="admin-save-btn" data-id="${game.id}"><i class="fas fa-save"></i> حفظ</button>
        <button class="admin-delete-btn" data-id="${game.id}"><i class="fas fa-trash"></i> حذف</button>
      `;
      container.appendChild(item);
    });
    
    document.querySelectorAll(".admin-save-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.getAttribute("data-id"));
        const newPrice = parseFloat(document.getElementById(`price-${id}`).value);
        const game = gamesData.find(g => g.id === id);
        if (game && !isNaN(newPrice)) {
          game.priceOMR = newPrice;
          saveGamesToLocal();
          renderAdminPanel();
          renderGames();
        }
      });
    });
    
    document.querySelectorAll(".admin-delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.getAttribute("data-id"));
        gamesData = gamesData.filter(g => g.id !== id);
        saveGamesToLocal();
        renderAdminPanel();
        renderGames();
      });
    });
  }

  function addNewGame() {
    const nameAr = document.getElementById("newGameNameAr").value;
    const nameEn = document.getElementById("newGameNameEn").value;
    const version = document.getElementById("newGameVersion").value;
    const price = parseFloat(document.getElementById("newGamePrice").value);
    const image = document.getElementById("newGameImage").value || "https://via.placeholder.com/600x400?text=New+Game";
    
    if (!nameAr || !nameEn || !version || isNaN(price)) {
      alert("يرجى ملء جميع الحقول بشكل صحيح");
      return;
    }
    
    const newGame = {
      id: nextId++,
      nameAr, nameEn, version,
      priceOMR: price,
      image: image,
      fallback: image,
      msgAr: `أريد ${nameAr}`,
      msgEn: `I want ${nameEn}`
    };
    
    gamesData.push(newGame);
    saveGamesToLocal();
    renderAdminPanel();
    renderGames();
    
    document.getElementById("newGameNameAr").value = "";
    document.getElementById("newGameNameEn").value = "";
    document.getElementById("newGameVersion").value = "";
    document.getElementById("newGamePrice").value = "";
    document.getElementById("newGameImage").value = "";
  }

  function updateUIForUser() {
    const authDiv = document.getElementById("authButtons");
    const welcomeMsg = document.getElementById("welcomeMsg");
    
    if (currentUser.type === "admin") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-crown"></i> مرحباً Admin</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 مرحباً بك أيها المدير! يمكنك تعديل الأسعار والحذف والإضافة" : "🎮 Welcome Admin! You can edit prices, delete and add games";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else if (currentUser.type === "user") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> مرحباً ${currentUser.name}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 أهلاً بك! يمكنك تصفح الألعاب والطلب عبر واتساب" : "🎮 Welcome! You can browse games and order via WhatsApp";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else {
      authDiv.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user"></i> تسجيل دخول</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "ألعاب PS4 / PS5 – أسعار محدثة – رصيد شحن فوري" : "PS4 / PS5 Games – Updated Prices – Instant Credit";
      document.getElementById("showLoginBtn")?.addEventListener("click", () => showLoginModal());
    }
  }

  function logout() {
    currentUser = { type: "guest", name: "زائر" };
    updateUIForUser();
    renderGames();
    const adminPanel = document.getElementById("adminPanel");
    if (adminPanel) adminPanel.classList.remove("active");
  }

  function showLoginModal() {
    document.getElementById("loginModal").classList.add("active");
  }

  function handleLogin() {
    const userType = document.getElementById("userTypeSelect").value;
    if (userType === "admin") {
      const password = document.getElementById("adminPassword").value;
      if (password === ADMIN_PASSWORD) {
        currentUser = { type: "admin", name: "Admin" };
        updateUIForUser();
        document.getElementById("loginModal").classList.remove("active");
        document.getElementById("adminPanel").classList.add("active");
        renderAdminPanel();
        document.getElementById("addGameBtn").onclick = addNewGame;
      } else {
        document.getElementById("loginError").textContent = "كلمة السر غير صحيحة";
      }
    } else {
      currentUser = { type: "user", name: "عميل" };
      updateUIForUser();
      document.getElementById("loginModal").classList.remove("active");
    }
  }

  // تهيئة الأحداث
  document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
  document.getElementById("closeLoginBtn")?.addEventListener("click", () => document.getElementById("loginModal").classList.remove("active"));
  document.getElementById("loginSubmitBtn")?.addEventListener("click", handleLogin);
  document.getElementById("closeAdminBtn")?.addEventListener("click", () => document.getElementById("adminPanel").classList.remove("active"));

    document.getElementById("adminPasswordField").style.display = e.target.value === "admin" ? "block" : "none";
  });
