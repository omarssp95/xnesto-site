<script>
  // --- الجزء البرمجي المحدث ---
  let products = [];
  let currentUser = { type: "guest", name: "زائر" };
  const ADMIN_PASSWORD = "ssp1995";
  const WA_NUMBER = "96879977100";

  // دالة جلب البيانات من GitHub (تضمن رؤية التحديثات للجميع)
  async function loadFromLocal() {
    const url = `products.json?t=${new Date().getTime()}`;
    try {
        const response = await fetch(url);
        if (response.ok) {
            const data = await response.json();
            products = [...data.games, ...data.giftcards];
            localStorage.setItem("xnesto_version", data.version);
            localStorage.setItem("xnesto_products", JSON.stringify(products));
            renderProducts();
            return;
        }
    } catch (e) { console.error("Fetch error:", e); }

    // خيار احتياطي
    const saved = localStorage.getItem("xnesto_products");
    if (saved) {
        products = JSON.parse(saved);
    } else {
        // البيانات الافتراضية هنا
        products = []; 
    }
    renderProducts();
  }

  // دالة الحفظ المحدثة (ترسل لـ GitHub)
  function saveToLocal() {
    localStorage.setItem("xnesto_products", JSON.stringify(products));
    // إذا كنت المسؤول، سيتم تحديث الملف على GitHub ليراه الجميع فوراً
    if (typeof updateGitHubProducts === "function" && currentUser.type === 'admin') {
        updateGitHubProducts(products); 
    }
  }

  // استدعاء الجلب عند التحميل
  window.onload = loadFromLocal;

  // ... (باقي الدوال الأصلية للموقع) ...
</script>
