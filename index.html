    { id: 24, nameAr: "Gran Turismo 7", nameEn: "Gran Turismo 7", category: "games", priceOMR: 11, oldPrice: 17, image: "https://image.api.playstation.com/vulcan/ap/rnd/202109/1321/nBW6AOVBgTYGhhUEVwklGPgr.png", detailsAr: "🏷️ الحجم: 110GB | 🏎️ سباق سيارات", detailsEn: "📦 Size: 110GB | 🏎️ Racing" },
    { id: 25, nameAr: "The Witcher 3: Wild Hunt", nameEn: "The Witcher 3: Wild Hunt", category: "games", priceOMR: 7, oldPrice: 12, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/292030/header.jpg", detailsAr: "🏷️ الحجم: 50GB | 🗡️ RPG خيالي", detailsEn: "📦 Size: 50GB | 🗡️ Fantasy RPG" }
  ];
  
  // إضافة المزيد من الألعاب حتى 80+
  for (let i = 26; i <= 85; i++) {
    allGames.push({
      id: i,
      nameAr: `لعبة PS5 مميزة ${i}`,
      nameEn: `Premium PS5 Game ${i}`,
      category: "games",
      priceOMR: 9 + Math.floor(Math.random() * 10),
      oldPrice: 12 + Math.floor(Math.random() * 10),
      image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2358720/header.jpg",
      detailsAr: `🏷️ لعبة رقم ${i} - تجربة ممتعة`,
      detailsEn: `Game ${i} - Amazing experience`
    });
  }
  
  // ==================== بطاقات شحن لجميع الدول ====================
  const giftCards = [
    { id: 101, nameAr: "🇺🇸 بطاقة شحن أمريكي", nameEn: "🇺🇸 US Gift Card", category: "giftcards", priceOMR: 5, oldPrice: 6, image: "", detailsAr: "الفئات: 10$ | 25$ | 50$ | 100$", detailsEn: "Values: 10$ | 25$ | 50$ | 100$" },
    { id: 102, nameAr: "🇸🇦 بطاقة شحن سعودي", nameEn: "🇸🇦 Saudi Gift Card", category: "giftcards", priceOMR: 4.5, oldPrice: 5.5, image: "", detailsAr: "الفئات: 50ر.س | 100ر.س | 200ر.س", detailsEn: "Values: 50 SAR | 100 SAR | 200 SAR" },
    { id: 103, nameAr: "🇦🇪 بطاقة شحن إماراتي", nameEn: "🇦🇪 UAE Gift Card", category: "giftcards", priceOMR: 5, oldPrice: 6, image: "", detailsAr: "الفئات: 50د.إ | 100د.إ | 200د.إ", detailsEn: "Values: 50 AED | 100 AED | 200 AED" },
    { id: 104, nameAr: "🇶🇦 بطاقة شحن قطري", nameEn: "🇶🇦 Qatar Gift Card", category: "giftcards", priceOMR: 4.5, oldPrice: 5.5, image: "", detailsAr: "الفئات: 50ر.ق | 100ر.ق | 200ر.ق", detailsEn: "Values: 50 QAR | 100 QAR | 200 QAR" },
    { id: 105, nameAr: "🇰🇼 بطاقة شحن كويتي", nameEn: "🇰🇼 Kuwait Gift Card", category: "giftcards", priceOMR: 6, oldPrice: 7, image: "", detailsAr: "الفئات: 5د.ك | 10د.ك | 20د.ك", detailsEn: "Values: 5 KWD | 10 KWD | 20 KWD" },
    { id: 106, nameAr: "🇧🇭 بطاقة شحن بحريني", nameEn: "🇧🇭 Bahrain Gift Card", category: "giftcards", priceOMR: 5.5, oldPrice: 6.5, image: "", detailsAr: "الفئات: 5د.ب | 10د.ب | 20د.ب", detailsEn: "Values: 5 BHD | 10 BHD | 20 BHD" },
    { id: 107, nameAr: "🇴🇲 بطاقة شحن عماني", nameEn: "🇴🇲 Oman Gift Card", category: "giftcards", priceOMR: 5, oldPrice: 6, image: "", detailsAr: "الفئات: 5ر.ع | 10ر.ع | 20ر.ع", detailsEn: "Values: 5 OMR | 10 OMR | 20 OMR" },
    { id: 108, nameAr: "🇮🇳 بطاقة شحن هندي", nameEn: "🇮🇳 India Gift Card", category: "giftcards", priceOMR: 3.5, oldPrice: 4.5, image: "", detailsAr: "الفئات: 500₹ | 1000₹ | 2000₹", detailsEn: "Values: 500₹ | 1000₹ | 2000₹" },
    { id: 109, nameAr: "🇹🇷 بطاقة شحن تركي", nameEn: "🇹🇷 Turkey Gift Card", category: "giftcards", priceOMR: 4, oldPrice: 5, image: "", detailsAr: "الفئات: 100₺ | 250₺ | 500₺", detailsEn: "Values: 100₺ | 250₺ | 500₺" },
    { id: 110, nameAr: "🇮🇩 بطاقة شحن إندونيسي", nameEn: "🇮🇩 Indonesia Gift Card", category: "giftcards", priceOMR: 4, oldPrice: 5, image: "", detailsAr: "الفئات: 50k | 100k | 200k", detailsEn: "Values: 50k | 100k | 200k" }
  ];
  
  const allProducts = [...allGames, ...giftCards];
  
  // ==================== Firebase Functions ====================
  function loadFromFirebase() {
    productsRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data && Array.isArray(data) && data.length > 0) {
        products = data;
      } else if (data && typeof data === 'object' && Object.keys(data).length > 0) {
        products = Object.values(data);
      } else {
        products = JSON.parse(JSON.stringify(allProducts));
      }
      renderProducts();
    });
  }
  
  // ==================== Customer Login Functions ====================
  function showLoginModal() {
    const email = prompt('📧 أدخل بريدك الإلكتروني:');
    const name = prompt('👤 أدخل اسمك:');
    if (email && name) {
      currentUser = { email, name };
      localStorage.setItem('xnesto_customer', JSON.stringify(currentUser));
      updateUserUI();
      alert(`مرحباً ${name}! تم تسجيل الدخول بنجاح 🎉`);
    }
  }
  
  function logoutCustomer() {
    currentUser = null;
    localStorage.removeItem('xnesto_customer');
    updateUserUI();
    alert('تم تسجيل الخروج بنجاح');
  }
  
  function updateUserUI() {
    const authDiv = document.getElementById('authButtons');
    if (currentUser) {
      authDiv.innerHTML = `
        <div class="user-info">
          <i class="fas fa-user-check"></i>
          <span>${currentUser.name.split(' ')[0]}</span>
          <button class="logout-btn-small" onclick="logoutCustomer()">خروج</button>
        </div>
      `;
    } else {
      authDiv.innerHTML = `<button class="customer-btn" onclick="showLoginModal()"><i class="fas fa-user"></i> <span>تسجيل دخول</span></button>`;
    }
  }
  
  // ==================== Display Functions ====================
  function formatPrice(price) {
    return `${currencySymbols[currentCurrency]} ${(price * exchangeRates[currentCurrency]).toFixed(2)}`;
  }
  
  function getFilteredProducts() {
    let filtered = [...products];
    if (searchQuery.trim()) {
      const query = searchQuery.toLowerCase();
      filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(query) || p.nameEn.toLowerCase().includes(query));
    }
    if (currentCategory !== 'all') {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    return filtered;
  }
  
  function renderProducts() {
    const filtered = getFilteredProducts();
    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageProducts = filtered.slice(start, start + ITEMS_PER_PAGE);
    
    const container = document.getElementById('productsContainer');
    if (pageProducts.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد منتجات حالياً</div>';
      return;
    }
    
    container.innerHTML = pageProducts.map(p => {
      const name = currentLang === 'ar' ? p.nameAr : p.nameEn;
      const desc = currentLang === 'ar' ? p.detailsAr : p.detailsEn;
      const price = formatPrice(p.priceOMR);
      const hasDiscount = p.oldPrice && p.oldPrice > p.priceOMR;
      const oldPrice = hasDiscount ? formatPrice(p.oldPrice) : null;
      const discountPercent = hasDiscount ? Math.round((1 - p.priceOMR / p.oldPrice) * 100) : 0;
      const categoryName = p.category === 'games' ? (currentLang === 'ar' ? '🎮 ألعاب PS4/PS5' : '🎮 Games') : (currentLang === 'ar' ? '💳 بطاقات شحن' : '💳 Gift Cards');
      
      let imageHtml = '';
      if (p.image && p.image.trim()) {
        imageHtml = `<div class="product-image" style="background-image: url('${p.image}');"><div class="product-badge">${categoryName}</div></div>`;
      } else {
        imageHtml = `<div class="product-image" style="background: linear-gradient(135deg, #1e3a5f, #0f2a4a); display: flex; align-items: center; justify-content: center;"><div style="font-size: 2.5rem;">${p.category === 'games' ? '🎮' : '💳'}</div><div class="product-badge">${categoryName}</div></div>`;
      }
      
      return `
        <div class="product-card">
          ${hasDiscount ? `<div class="discount-badge">🔥 -${discountPercent}%</div>` : ''}
          ${imageHtml}
          <div class="card-info">
            <div class="product-title">${escapeHtml(name)}</div>
            <div class="product-details">${escapeHtml(desc || '')}</div>
            <div class="price-container">
              ${hasDiscount ? `<span class="old-price">${oldPrice}</span>` : ''}
              <span class="price">${price}</span>
            </div>
            <button class="btn-wa" onclick="buyProduct('${escapeHtml(name)}', ${p.priceOMR})">
              <i class="fab fa-whatsapp"></i> ${currentLang === 'ar' ? 'اطلب الآن' : 'Order Now'}
            </button>
          </div>
        </div>
      `;
    }).join('');
    
    const pagContainer = document.getElementById('pagination');
    if (totalPages > 1) {
      let pagesHtml = '';
      for (let i = 1; i <= totalPages; i++) {
        pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      pagContainer.innerHTML = pagesHtml;
    } else {
      pagContainer.innerHTML = '';
    }
    document.getElementById('searchCount').innerHTML = filtered.length;
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function goToPage(page) {
    currentPage = page;
    renderProducts();
  }
  
  function setCategory(cat) {
    currentCategory = cat;
    currentPage = 1;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProducts();
  }
  
  function buyProduct(name, price) {
    if (!currentUser) {
      alert('الرجاء تسجيل الدخول أولاً');
      showLoginModal();
      return;
    }
    const sym = currencySymbols[currentCurrency];
    const convertedPrice = (price * exchangeRates[currentCurrency]).toFixed(2);
    const message = `🛒 طلب شراء من xnesto\n━━━━━━━━━━━━━━━━━━━━\n🎮 المنتج: ${name}\n💰 السعر: ${sym} ${convertedPrice}\n👤 العميل: ${currentUser.name}\n📧 البريد: ${currentUser.email}\n━━━━━━━━━━━━━━━━━━━━\n📞 يرجى تأكيد الطلب.`;
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
  }
  
  // ==================== UI Functions ====================
  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProducts();
  }
  
  function setCurrency(currency) {
    currentCurrency = currency;
    renderProducts();
  }
  
  function toggleMode() {
    const isLight = document.body.classList.toggle('light-mode');
    const btn = document.querySelector('.mode-toggle-btn');
    btn.innerHTML = isLight ? '☀️ نهاري' : '🌙 ليلي';
    localStorage.setItem('xnesto_mode', isLight ? 'light' : 'dark');
  }
  
  function setView(view) {
    document.body.classList.remove('view-mobile', 'view-desktop');
    document.body.classList.add('view-' + view);
    localStorage.setItem('xnesto_view', view);
  }
  
  // ==================== Event Listeners ====================
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    currentPage = 1;
    renderProducts();
  });
  
  // Load saved preferences
  const savedMode = localStorage.getItem('xnesto_mode');
  if (savedMode === 'light') {
    document.body.classList.add('light-mode');
    document.querySelector('.mode-toggle-btn').innerHTML = '☀️ نهاري';
  }
  const savedView = localStorage.getItem('xnesto_view') || 'mobile';
  setView(savedView);
  
  // Load saved customer
  const savedCustomer = localStorage.getItem('xnesto_customer');
  if (savedCustomer) {
    currentUser = JSON.parse(savedCustomer);
    updateUserUI();
  }
  
  document.getElementById('instagramText').innerHTML = `<a href="https://instagram.com/${INSTA_USERNAME}" target="_blank" style="color:#ffaa66;text-decoration:none;">${INSTA_USERNAME}</a>`;
  document.getElementById('whatsappText').innerHTML = `<a href="https://wa.me/${WA_NUMBER}" target="_blank" style="color:#ffaa66;text-decoration:none;">+${WA_NUMBER}</a>`;
  
  // Initialize
  loadFromFirebase();
</script>
</body>
</html>
