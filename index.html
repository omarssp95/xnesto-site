    .device-bar {

      border-bottom: 1px solid rgba(255,170,68,0.2);

  <title>xnesto – متجر الألعاب وبطاقات الشحن | PS4/PS5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%);
      font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
      color: #f0f0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }
    
    .header {
      text-align: center;
      background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
      padding: 0.5rem 1rem 1.5rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 170, 68, 0.3);
      overflow: visible;
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ffaa44, #ffcc88, #ffaa44);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .logo-glow {
      animation: logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 8px rgba(255,170,44,0.9)) drop-shadow(0 0 20px rgba(255,100,0,0.6)); }
      50%      { filter: drop-shadow(0 0 16px rgba(255,200,44,1))  drop-shadow(0 0 35px rgba(255,140,0,0.9)); }
    }
    /* ── FIRE ── */
    .fire-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 4px;
      height: 55px;
      margin-bottom: 4px;
    }
    .fire-flame {
      width: 14px;
      border-radius: 50% 50% 20% 20%;
      animation: flicker 0.5s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }
    .fire-flame:nth-child(1) { background: linear-gradient(to top, #ff4400, #ffaa00, #ffff00); height: 25px; animation-delay: 0.0s; }
    .fire-flame:nth-child(2) { background: linear-gradient(to top, #ff3300, #ff8800, #ffee00); height: 38px; animation-delay: 0.1s; }
    .fire-flame:nth-child(3) { background: linear-gradient(to top, #ff4400, #ffaa00, #ffff00); height: 30px; animation-delay: 0.2s; }
    .fire-flame:nth-child(4) { background: linear-gradient(to top, #ff2200, #ff6600, #ffdd00); height: 45px; animation-delay: 0.05s; }
    .fire-flame:nth-child(5) { background: linear-gradient(to top, #ff3300, #ff9900, #ffff00); height: 52px; animation-delay: 0.15s; width: 18px; }
    .fire-flame:nth-child(6) { background: linear-gradient(to top, #ff2200, #ff6600, #ffdd00); height: 45px; animation-delay: 0.0s; }
    .fire-flame:nth-child(7) { background: linear-gradient(to top, #ff4400, #ffaa00, #ffff00); height: 30px; animation-delay: 0.2s; }
    .fire-flame:nth-child(8) { background: linear-gradient(to top, #ff3300, #ff8800, #ffee00); height: 38px; animation-delay: 0.1s; }
    .fire-flame:nth-child(9) { background: linear-gradient(to top, #ff4400, #ffaa00, #ffff00); height: 25px; animation-delay: 0.05s; }
    @keyframes flicker {
      0%   { transform: scaleX(1)   scaleY(1)   rotate(-4deg); opacity: 1;   }
      100% { transform: scaleX(0.8) scaleY(1.2) rotate(4deg);  opacity: 0.8; }
    }
    .header p { color: #ffdd99; font-size: 0.9rem; }
    
    .control-bar {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: rgba(15, 15, 42, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 170, 68, 0.2);
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px;
      border-radius: 40px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      color: #ccc;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .lang-btn.active { background: #ffaa44; color: #0a0a1a; }
    .currency-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px 12px;
      border-radius: 40px;
    }
    #currencySelect {
      background: #0a0c1a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 5px 10px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .user-badge {
      background: #1e1e3a;
      padding: 6px 14px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ffaa66;
      font-size: 0.8rem;
    }
    .login-btn, .logout-btn {

      color: #ffaa66;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .admin-add-section {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.9);
      border-radius: 1rem;
      border: 2px solid #ffaa44;
      overflow: hidden;
      display: none;
    }
    .admin-add-section.active { display: block; }
    .admin-add-header {

      padding: 0.8rem 1.5rem;

      justify-content: space-between;

    }

    .admin-add-body {

      display: flex;
      flex-wrap: wrap;

    }
    .admin-add-body input, .admin-add-body select, .admin-add-body textarea {

      flex: 1;

    }
    .admin-add-body textarea { min-width: 200px; border-radius: 15px; }
    
    .image-upload-area {
      background: #1e1e3a;
      border: 2px dashed #ffaa44;
      border-radius: 1rem;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      min-width: 150px;
    }
    .image-upload-area:hover { background: #2d2f6e; }
    .image-upload-area input { display: none; }
    .image-preview {
      margin-top: 8px;
      max-width: 100%;
      max-height: 80px;
      border-radius: 8px;
      display: none;
      object-fit: contain;
    }
    .btn-add-product {
      background: #00cc88;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .category-management {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.9);
      border-radius: 1rem;
      border: 1px solid rgba(255, 170, 68, 0.3);
      padding: 0.8rem 1rem;
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .category-management.active { display: flex; }
    .category-management span { color: #ffaa66; font-size: 0.8rem; }
    .category-badge {
      background: #2d2f6e;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .category-badge i { cursor: pointer; color: #ff6666; }
    .add-category-input {
      display: flex;
      gap: 5px;
    }
    .add-category-input input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 4px 10px;
      color: white;
      width: 120px;
    }
    .add-category-input button {
      background: #ffaa44;
      border: none;
      padding: 4px 12px;
      border-radius: 30px;
      cursor: pointer;
    }
    
    .search-bar-container {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.8);
      padding: 8px 20px;
      border-radius: 50px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e3a;
      padding: 5px 15px;
      border-radius: 40px;
    }
    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      color: white;
      outline: none;
    }
    .search-results-count {
      background: #2d2f6e;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #ffaa66;
    }
    
    .tabs-container {
      max-width: 1400px;
      margin: 0 auto 2rem auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 0 4px;
    }
    @media (max-width: 640px) {
      .tabs-container { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    }
    .tab-btn {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      aspect-ratio: 1/1;
      transition: 0.25s;
      background: #1e1e3a;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    .tab-btn:hover { transform: translateY(-3px); border-color: #ffaa44; }
    .tab-btn.active { border-color: #ffaa44; box-shadow: 0 0 16px rgba(255,170,68,0.4); }
    .tab-btn-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background-size: cover;
      background-position: center;
    }
    .tab-btn-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
    }
    .tab-btn-text {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 8px 6px;
      width: 100%;
    }
    .tab-btn-title {
      display: block;
      font-size: 0.85rem;
      font-weight: 900;
      color: white;
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .tab-btn-sub {
      display: block;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.65);
      margin-top: 2px;
    }
    @media (max-width: 640px) {
      .tab-btn-title { font-size: 0.75rem; }
      .tab-btn-sub { font-size: 0.55rem; }
    }
    
    .products-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255,170,68,0.15);
    }
    .product-card {
      background: #11152b;
      border-radius: 1rem;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid rgba(255, 170, 68, 0.2);
      position: relative;
    }
    .product-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
    .discount-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #ff4444;
      color: white;

      font-size: 0.7rem;
      font-weight: bold;
      z-index: 2;
    }
    .timer-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #ffaa44;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.6rem;
      z-index: 2;
    }
    .product-image {
      width: 100%;
      height: 200px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #0a0c1a;
    }
    .product-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);

      padding: 3px 10px;
      border-radius: 20px;

      color: #ffcc77;
      font-weight: bold;
    }
    .card-info { padding: 0.8rem; }
    .product-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .product-category { font-size: 0.6rem; color: #ffaa66; margin-bottom: 6px; text-align: center; }
    .product-details {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 10px;
      margin: 8px 0;
      font-size: 0.65rem;

    }
    .price-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 6px 0;
    }
    .old-price { font-size: 0.8rem; color: #888; text-decoration: line-through; }
    .price { font-size: 1.2rem; font-weight: 800; color: #ffaa44; }
    .btn-wa {
      display: inline-flex;

    .save-edit-btn {

<script>
  // نار متحركة
  const fc = document.getElementById('fire-container');
  function createFire() {
    if (!fc) return;
    const f = document.createElement('div');
    const size = Math.random() * 35 + 15;
    Object.assign(f.style, {
      position:'absolute', bottom:'0',
      width: size+'px', height: size+'px',
      background:'radial-gradient(circle,#fff,#ffcc66,#ff4500,transparent 70%)',
      borderRadius:'50% 50% 20% 20%',
      left: Math.random()*100+'%',
      animation:'riseUp '+(Math.random()*0.5+0.8)+'s ease-in forwards',
      mixBlendMode:'screen', pointerEvents:'none'
    });
    fc.appendChild(f);
    setTimeout(()=>f.remove(), 1200);
  }
  // شرارات
  function createSpark() {
    if (!fc) return;
    const s = document.createElement('div');
    Object.assign(s.style, {
      position:'absolute', width:'3px', height:'3px',
      background:'#fff', borderRadius:'50%',
      left: Math.random()*100+'%', bottom:'10px',
      boxShadow:'0 0 8px #ffcc66', zIndex:'3'
    });
    fc.appendChild(s);
    const anim = s.animate([
      {transform:'translate(0,0)', opacity:1},
      {transform:`translate(${(Math.random()-0.5)*150}px,-200px)`, opacity:0}
    ], {duration:1500, easing:'ease-out'});
    anim.onfinish = ()=>s.remove();
  }
  // أيقونات طائرة
  const pc = document.getElementById('particles-container');
  const icons = ['🎮','💿','⚡','⭐','🔥','🕹️','💎','💳'];
  function createIcon() {
    if (!pc) return;
    const ic = document.createElement('div');
    const mx = (Math.random()-0.5)*300, my = (Math.random()-0.5)*200;
    const dur = Math.random()*4+4;
    Object.assign(ic.style, {
      position:'absolute',
      fontSize: (Math.random()*16+14)+'px',
      left: Math.random()*100+'%',
      top:  Math.random()*100+'%',
      opacity:'0',
      animation:`iconDrift ${dur}s linear forwards`,
      '--mx': mx+'px', '--my': my+'px'
    });
    ic.textContent = icons[Math.floor(Math.random()*icons.length)];
    pc.appendChild(ic);
    setTimeout(()=>ic.remove(), dur*1000);
  }
  setInterval(createFire, 100);
  setInterval(createSpark, 200);
  setInterval(createIcon, 600);
</script>

    0%   { transform:translate(0,0) rotate(0deg);   opacity:0; }
    20%  { opacity:0.6; }
