<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم xnesto الآمنة 🛠️</title>
    <style>
        body { background: #0a0a1a; font-family: 'Cairo', sans-serif; color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e3a; padding: 30px; border-radius: 20px; border: 2px solid #ffaa44; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0a0a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .product-item { background: #2a2a4a; padding: 10px; margin: 10px 0; border-radius: 10px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إعداد لوحة التحكم 🛠️</h2>
        <div id="setupArea">
            <p style="color: #ffaa44;">يرجى إدخال الرمز السري (Token) الخاص بك للبدء:</p>
            <input type="password" id="tokenInput" placeholder="ghp_...">
            <button onclick="saveToken()" class="btn" style="background:#ffaa44; color:#000;">حفظ الرمز والبدء</button>
        </div>
        <div id="adminArea" style="display:none;">
            <div id="productsList">جاري التحميل...</div>
            <button id="saveBtn" class="btn" onclick="saveData()">✅ حفظ التغييرات للجميع</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        let GITHUB_TOKEN = localStorage.getItem('my_github_token');
        const REPO = 'omarssp95/xnesto-site';
        let productsData = null;

        if (GITHUB_TOKEN) {
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('adminArea').style.display = 'block';
            loadData();
        }

        function saveToken() {
            const val = document.getElementById('tokenInput').value.trim();
            if (val.startsWith('ghp_')) {
                localStorage.setItem('my_github_token', val);
                GITHUB_TOKEN = val;
                location.reload();
            } else { alert('الرمز غير صحيح! يجب أن يبدأ بـ ghp_'); }
        }

        async function loadData() {
            const res = await fetch(`products.json?t=${Date.now()}`);
            productsData = await res.json();
            render();
        }

        function render() {
            const list = document.getElementById('productsList');
            let html = '';
            [...productsData.games, ...productsData.giftcards].forEach((p, i) => {
                html += `<div class="product-item">
                    <label>${p.nameAr}:</label>
                    <input type="number" step="0.1" value="${p.priceOMR}" onchange="updatePrice(${p.id}, this.value)">
                </div>`;
            });
            list.innerHTML = html;
        }

        function updatePrice(id, val) {
            let p = productsData.games.find(x => x.id === id) || productsData.giftcards.find(x => x.id === id);
            if (p) p.priceOMR = parseFloat(val);
        }

        async function saveData() {
            const status = document.getElementById('status');
            try {
                const url = `https://api.github.com/repos/${REPO}/contents/products.json`;
                const fileRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const fileData = await fileRes.json();
                
                productsData.version = "v_" + Date.now();
                const encodedContent = btoa(unescape(encodeURIComponent(JSON.stringify(productsData, null, 2))));

                const updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update", content: encodedContent, sha: fileData.sha })
                });

                if (updateRes.ok) alert("✅ تم الحفظ بنجاح!");
                else {
                    const err = await updateRes.json();
                    if (err.message.includes("401")) {
                        alert("❌ الرمز السري انتهى أو تم تعطيله! يرجى إنشاء رمز جديد من GitHub.");
                        localStorage.removeItem('my_github_token');
                        location.reload();
                    } else { alert("خطأ: " + err.message); }
                }
            } catch (e) { alert("خطأ في الاتصال: " + e.message); }
        }
    </script>
</body>
</html>
