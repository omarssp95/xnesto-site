<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - لوحة الإدارة المتطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
            color: #f0f0ff;
            padding: 1rem;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
            padding: 0.5rem 1rem 1rem;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 170, 68, 0.3);
        }
        .header h1 { color: #ffaa44; font-size: 1.6rem; }
        .header p { color: #ffdd99; font-size: 0.8rem; }
        
        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,170,68,0.2);
            padding-bottom: 0.5rem;
        }
        .admin-tab {
            background: #1e1e3a;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
            transition: 0.2s;
        }
        .admin-tab.active { background: #ffaa44; color: #0a0a1a; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: #11152b;
            border-radius: 1rem;
            padding: 0.6rem;
            text-align: center;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .stat-card i { font-size: 1.2rem; color: #ffaa44; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #ffaa44; }
        .stat-label { font-size: 0.65rem; opacity: 0.7; }
        
        /* Tables */
        .data-table {
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            overflow-x: auto;
            margin-top: 0.5rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; }
        th { background: rgba(0,55,145,0.3); color: #ffaa44; }
        
        .status-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
        }
        .status-pending { background: #ffaa44; color: #0a0a1a; }
        .status-processing { background: #2d2f6e; color: white; }
        .status-completed { background: #00cc88; color: #0a0a1a; }
        
        .btn-sm {
            background: #2d2f6e;
            border: none;
            padding: 4px 10px;
            border-radius: 1.5rem;
            cursor: pointer;
            color: white;
            font-size: 0.7rem;
        }
        .btn-success { background: #00cc88; }
        .btn-danger { background: #ff4444; }
        .btn-warning { background: #ffaa44; color: #0a0a1a; }
        
        .control-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            justify-content: space-between;
        }
        .search-input, .filter-select {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: white;
            font-size: 0.8rem;
        }
        .back-link, .logout-btn {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }
        .back-link { background: #ffaa44; color: #0a0a1a; }
        .logout-btn { background: #ff4444; color: white; }
        
        /* Forms */
        .admin-panel {
            background: #11152b;
            border: 2px solid #ffaa44;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .admin-panel h3 { color: #ffaa44; margin-bottom: 0.5rem; font-size: 1rem; }
        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .add-form input, .add-form textarea, .add-form select {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: white;
            flex: 1;
            min-width: 100px;
            font-size: 0.8rem;
        }
        .btn-save { background: #00cc88; border: none; padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; font-weight: bold; }
        .image-upload-area {
            background: #1e1e3a;
            border: 2px dashed #ffaa44;
            border-radius: 1rem;
            padding: 0.4rem;
            text-align: center;
            cursor: pointer;
            flex: 1;
        }
        .image-upload-area input { display: none; }
        .image-preview { margin-top: 5px; max-width: 100%; max-height: 50px; border-radius: 8px; display: none; }
        
        .categories-manager {
            background: #11152b;
            border: 1px solid rgba(255,170,68,0.3);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .categories-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
        .category-badge { background: #2d2f6e; padding: 4px 12px; border-radius: 2rem; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
        .category-badge i { cursor: pointer; color: #ff6666; }
        .add-category-input { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .add-category-input input { background: #1e1e3a; border: 1px solid #ffaa44; border-radius: 2rem; padding: 0.4rem 0.8rem; color: white; flex: 1; }
        .add-category-input button { background: #ffaa44; border: none; padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; font-weight: bold; color: #0a0a1a; }
        
        .product-edit-form {
            background: #1e1e3a;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .product-edit-form input, .product-edit-form textarea, .product-edit-form select {
            width: 100%;
            padding: 0.3rem;
            margin: 0.2rem 0;
            border-radius: 1rem;
            background: #0a0c1a;
            border: 1px solid #ffaa44;
            color: white;
            font-size: 0.7rem;
        }
        .stock-input { width: 55px; background: #1e1e3a; border: 1px solid #ffaa44; border-radius: 1rem; padding: 2px 4px; text-align: center; }
        .edit-btn, .delete-btn { padding: 3px 8px; margin: 0 2px; border: none; border-radius: 1rem; cursor: pointer; font-size: 0.65rem; }
        .edit-btn { background: #ffa500; color: #fff; }
        .delete-btn { background: #ff4444; color: #fff; }
        .order-btn { background: #2d2f6e; border: none; padding: 3px 6px; border-radius: 1rem; cursor: pointer; color: white; font-size: 0.7rem; }
        
        .footer { text-align: center; margin-top: 1rem; padding: 1rem; color: #888; font-size: 0.7rem; }
        .loading { text-align: center; padding: 2rem; color: #ffaa44; }
        
        @media (max-width: 640px) {
            body { padding: 0.5rem; }
            th, td { padding: 4px; font-size: 0.6rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔐 لوحة إدارة xnesto <i class="fas fa-chart-line"></i></h1>
    <p>إدارة المنتجات - المخزون - الطلبات - قسائم الخصم</p>
</div>

<div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; justify-content: space-between;">
    <div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> المتجر</a>
        <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث">
        <select id="filterCategory" class="filter-select">
            <option value="all">الكل</option>
        </select>
    </div>
</div>

<!-- Tabs -->
<div class="admin-tabs" id="adminTabs">
    <button class="admin-tab active" data-tab="products">📦 المنتجات</button>
    <button class="admin-tab" data-tab="orders">📋 الطلبات</button>
    <button class="admin-tab" data-tab="coupons">🏷️ قسائم الخصم</button>
    <button class="admin-tab" data-tab="visitors">👥 الزوار</button>
    <button class="admin-tab" data-tab="categories">📁 التصنيفات</button>
</div>

<!-- قسم المنتجات -->
<div id="productsSection" class="section">
    <div id="productsStats" class="stats-grid" style="display:none;"></div>
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>➕ إضافة منتج جديد</h3>
        <div class="add-form">
            <input type="text" id="newNameAr" placeholder="الاسم بالعربية">
            <input type="text" id="newNameEn" placeholder="Name in English">
            <select id="newCategorySelect"></select>
            <input type="number" id="newPrice" step="0.5" placeholder="السعر">
            <input type="number" id="newOldPrice" step="0.5" placeholder="السعر القديم">
            <input type="number" id="newStock" step="1" placeholder="الكمية" value="99">
            <div class="image-upload-area" id="newImageUploadArea">
                <i class="fas fa-cloud-upload-alt"></i> 📸 صورة
                <input type="file" id="newImageFile" accept="image/*">
                <img id="newImagePreview" class="image-preview">
            </div>
            <textarea id="newDesc" rows="1" placeholder="وصف المنتج"></textarea>
            <button class="btn-save" onclick="addProduct()">💾 إضافة</button>
        </div>
    </div>
    <div id="productsTable" class="data-table"><div class="loading">🔐 جاري التحميل...</div></div>
</div>

<!-- قسم الطلبات -->
<div id="ordersSection" class="section" style="display:none;">
    <div id="ordersStats" class="stats-grid" style="display:none;"></div>
    <div class="data-table" id="ordersTable"><div class="loading">جاري تحميل الطلبات...</div></div>
</div>

<!-- قسم قسائم الخصم -->
<div id="couponsSection" class="section" style="display:none;">
    <div class="admin-panel">
        <h3>➕ إضافة قسيمة خصم جديدة</h3>
        <div class="add-form">
            <input type="text" id="couponCode" placeholder="كود القسيمة (مثل: XNESTO10)">
            <input type="number" id="couponDiscount" step="1" placeholder="نسبة الخصم %" value="10">
            <input type="number" id="couponMaxUses" step="1" placeholder="عدد مرات الاستخدام" value="50">
            <input type="date" id="couponExpiry" placeholder="تاريخ الانتهاء">
            <button class="btn-save" onclick="addCoupon()">💾 إضافة قسيمة</button>
        </div>
    </div>
    <div id="couponsTable" class="data-table"><div class="loading">جاري تحميل القسائم...</div></div>
</div>

<!-- قسم الزوار -->
<div id="visitorsSection" class="section" style="display:none;">
    <div id="visitorStats" class="stats-grid" style="display:none;"></div>
    <div id="visitorsTable" class="data-table"></div>
</div>

<!-- قسم التصنيفات -->
<div id="categoriesSection" class="section" style="display:none;">
    <div class="categories-manager">
        <h3><i class="fas fa-tags"></i> إدارة التصنيفات</h3>
        <div id="categoriesList" class="categories-list"></div>
        <div class="add-category-input">
            <input type="text" id="newCategoryName" placeholder="تصنيف جديد">
            <button id="addCategoryBtn"><i class="fas fa-plus"></i> إضافة</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>📞 واتساب: +96879977100 | 📸 انستقرام: xnesto_store</p>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const productsRef = database.ref('products');
    const visitorsRef = database.ref('visitors');
    const categoriesRef = database.ref('categories');
    const ordersRef = database.ref('orders');
    const couponsRef = database.ref('coupons');
    
    let products = [];
    let categories = ["games", "giftcards"];
    let categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
    let orders = [];
    let coupons = [];
    let currentImageData = null;
    let isLoggedIn = false;
    let searchQuery = "";
    let filterCategory = "all";
    let currentTab = "products";
    const ADMIN_PASSWORD = "ssp1995";
    const SESSION_KEY = "xnesto_admin_logged";
    const WA_NUMBER = "96879977100";
    
    // المنتجات الافتراضية
    const defaultGames = [
        { id: 1, nameAr: "Assassin's Creed Shadows", nameEn: "Assassin's Creed Shadows", priceOMR: 14, oldPrice: 20, stock: 50, image: "https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/3159340/header.jpg", detailsAr: "🏷️ 65GB | 🎮 عربي/إنجليزي", detailsEn: "📦 65GB | 🎮 Arabic/English", order: 1, sales: 145 },
        { id: 2, nameAr: "Call of Duty Black Ops 6", nameEn: "Call of Duty Black Ops 6", priceOMR: 22, oldPrice: 30, stock: 45, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2933620/header.jpg", detailsAr: "🏷️ 120GB | 🎮 إنجليزي", detailsEn: "📦 120GB | 🎮 English", order: 2, sales: 210 },
        { id: 3, nameAr: "Grand Theft Auto VI", nameEn: "Grand Theft Auto VI", priceOMR: 6, oldPrice: 10, stock: 100, image: "https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/downloads/gtavi/gtavi_cover_ps5.jpg", detailsAr: "🏷️ 150GB | 🌍 عالم مفتوح", detailsEn: "📦 150GB | 🌍 Open World", order: 3, sales: 320 },
        { id: 4, nameAr: "God of War Ragnarök", nameEn: "God of War Ragnarök", priceOMR: 10, oldPrice: 15, stock: 60, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2322010/header.jpg", detailsAr: "🏷️ 85GB | 🪓 ملحمة إسكندنافية", detailsEn: "📦 85GB | 🪓 Norse Saga", order: 4, sales: 180 },
        { id: 5, nameAr: "Spider-Man 2", nameEn: "Spider-Man 2", priceOMR: 16, oldPrice: 22, stock: 40, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2651280/header.jpg", detailsAr: "🏷️ 98GB | 🕷️ بيتر + مايلز", detailsEn: "📦 98GB | 🕷️ Peter + Miles", order: 5, sales: 195 }
    ];
    for (let i = 6; i <= 50; i++) {
        defaultGames.push({
            id: i, nameAr: `لعبة PS5 مميزة ${i}`, nameEn: `Premium PS5 Game ${i}`,
            priceOMR: 9 + Math.floor(Math.random() * 10), oldPrice: 12 + Math.floor(Math.random() * 10),
            stock: 20 + Math.floor(Math.random() * 80), order: i,
            image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2358720/header.jpg",
            detailsAr: `🏷️ لعبة رقم ${i}`, detailsEn: `Game ${i}`, sales: Math.floor(Math.random() * 100)
        });
    }
    const giftCards = [
        { id: 101, nameAr: "🇺🇸 بطاقة أمريكي", nameEn: "🇺🇸 US Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Flag_of_the_United_States.svg/30px-Flag_of_the_United_States.svg.png", detailsAr: "10$ | 25$ | 50$ | 100$", detailsEn: "10$ | 25$ | 50$ | 100$", order: 101, sales: 85 },
        { id: 102, nameAr: "🇸🇦 بطاقة سعودي", nameEn: "🇸🇦 Saudi Card", category: "giftcards", priceOMR: 4.5, oldPrice: 5.5, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Flag_of_Saudi_Arabia.svg/30px-Flag_of_Saudi_Arabia.svg.png", detailsAr: "50ر.س | 100ر.س | 200ر.س", detailsEn: "50 SAR | 100 SAR | 200 SAR", order: 102, sales: 92 },
        { id: 103, nameAr: "🇦🇪 بطاقة إماراتي", nameEn: "🇦🇪 UAE Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_United_Arab_Emirates.svg/30px-Flag_of_the_United_Arab_Emirates.svg.png", detailsAr: "50د.إ | 100د.إ | 200د.إ", detailsEn: "50 AED | 100 AED | 200 AED", order: 103, sales: 78 },
        { id: 104, nameAr: "🇴🇲 بطاقة عماني", nameEn: "🇴🇲 Oman Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Flag_of_Oman.svg/30px-Flag_of_Oman.svg.png", detailsAr: "5ر.ع | 10ر.ع | 20ر.ع", detailsEn: "5 OMR | 10 OMR | 20 OMR", order: 104, sales: 110 }
    ];
    for (let i = 0; i < defaultGames.length; i++) defaultGames[i].category = "games";
    for (let i = 0; i < giftCards.length; i++) giftCards[i].category = "giftcards";
    const allDefaultProducts = [...defaultGames, ...giftCards];
    
    // قسائم الخصم الافتراضية
    const defaultCoupons = [
        { code: "XNESTO10", discount: 10, maxUses: 50, used: 0, expiry: "2025-12-31", active: true },
        { code: "SAVE20", discount: 20, maxUses: 30, used: 0, expiry: "2025-06-30", active: true }
    ];
    
    // ==================== التحقق من الدخول ====================
    function checkSession() {
        if (localStorage.getItem(SESSION_KEY) === "true") { isLoggedIn = true; showAdminPanel(); }
        else askPassword();
    }
    
    function askPassword() {
        const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
        if (pwd === ADMIN_PASSWORD) {
            isLoggedIn = true;
            localStorage.setItem(SESSION_KEY, "true");
            showAdminPanel();
        } else if (pwd !== null) { alert('❌ كلمة السر غير صحيحة'); window.location.href = 'index.html'; }
    }
    
    function showAdminPanel() {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        loadProducts();
        loadOrders();
        loadCoupons();
        loadVisitorStats();
        loadCategories();
        switchTab('products');
    }
    
    function logout() { localStorage.removeItem(SESSION_KEY); window.location.reload(); }
    document.getElementById('logoutBtn').onclick = logout;
    
    // ==================== Tabs ====================
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.onclick = () => switchTab(tab.dataset.tab);
    });
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.admin-tab[data-tab="${tab}"]`).classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(`${tab}Section`).style.display = 'block';
        if (tab === 'products') { renderProductsTable(); updateProductsStats(); }
        if (tab === 'orders') { renderOrdersTable(); updateOrdersStats(); }
        if (tab === 'coupons') { renderCouponsTable(); }
        if (tab === 'visitors') { loadVisitorStats(); }
        if (tab === 'categories') { renderCategoriesList(); }
    }
    
    // ==================== المنتجات ====================
    function loadProducts() {
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data) && data.length > 0) products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
            else { products = JSON.parse(JSON.stringify(allDefaultProducts)); products.forEach((p, idx) => { p.order = idx; }); productsRef.set(products); }
            renderProductsTable();
            updateProductsStats();
        });
    }
    
    function saveProducts() { productsRef.set(products); }
    
    function updateProductsStats() {
        const totalProducts = products.length;
        const totalStock = products.reduce((sum, p) => sum + (p.stock || 0), 0);
        const totalValue = products.reduce((sum, p) => sum + ((p.priceOMR || 0) * (p.stock || 0)), 0);
        document.getElementById('productsStats').innerHTML = `
            <div class="stat-card"><i class="fas fa-box"></i><div class="stat-value">${totalProducts}</div><div class="stat-label">منتجات</div></div>
            <div class="stat-card"><i class="fas fa-cubes"></i><div class="stat-value">${totalStock}</div><div class="stat-label">إجمالي الكمية</div></div>
            <div class="stat-card"><i class="fas fa-dollar-sign"></i><div class="stat-value">${totalValue.toFixed(2)}</div><div class="stat-label">قيمة المخزون</div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${products.reduce((sum, p) => sum + (p.sales || 0), 0)}</div><div class="stat-label">إجمالي المبيعات</div></div>
        `;
        document.getElementById('productsStats').style.display = 'grid';
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(searchQuery) || p.nameEn.toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function renderProductsTable() {
        const filtered = getFilteredProducts();
        const container = document.getElementById('productsTable');
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد منتجات</div>'; return; }
        
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>الترتيب</th><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الكمية</th><th>المبيعات</th><th>التصنيف</th><th>إجراءات</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        `;
        
        const tbody = document.getElementById('productsTableBody');
        tbody.innerHTML = filtered.map((p, idx) => `
            <tr id="row-${p.id}">
                <td><div style="display:flex; gap:3px; justify-content:center;"><button class="order-btn" onclick="moveProductUp(${products.indexOf(p)})" ${idx === 0 ? 'disabled style="opacity:0.5;"' : ''}>⬆️</button><button class="order-btn" onclick="moveProductDown(${products.indexOf(p)})" ${idx === products.length-1 ? 'disabled style="opacity:0.5;"' : ''}>⬇️</button></div></td>
                <td><img src="${p.image || ''}" width="35" height="35" style="border-radius:6px;" onerror="this.src='https://via.placeholder.com/35'"></td>
                <td>${escapeHtml(p.nameAr)}<br><small>${escapeHtml(p.nameEn)}</small></td>
                <td>${p.priceOMR} ر.ع${p.oldPrice ? `<br><span style="text-decoration:line-through;">${p.oldPrice}</span>` : ''}</td>
                <td><input type="number" class="stock-input" id="stock_${p.id}" value="${p.stock || 0}" min="0" step="1" onchange="updateStock(${p.id}, this.value)"></td>
                <td>${p.sales || 0}</td>
                <td>${categoryNames[p.category] || p.category}</td>
                <td><button class="edit-btn" onclick="openEditForm(${p.id})">✏️</button><button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td>
            </tr>
            <tr id="edit-form-${p.id}" style="display:none;"><td colspan="8"><div class="product-edit-form"><input type="text" id="editNameAr_${p.id}" value="${escapeHtml(p.nameAr)}"><input type="text" id="editNameEn_${p.id}" value="${escapeHtml(p.nameEn)}"><input type="number" id="editPrice_${p.id}" value="${p.priceOMR}" step="0.5"><input type="number" id="editOldPrice_${p.id}" value="${p.oldPrice || ''}" step="0.5"><input type="number" id="editStock_${p.id}" value="${p.stock || 0}" step="1"><div class="edit-image-upload" onclick="document.getElementById('editImageFile_${p.id}').click()"><i class="fas fa-cloud-upload-alt"></i> صورة<input type="file" id="editImageFile_${p.id}" accept="image/*" style="display:none;"></div><img id="editImagePreview_${p.id}" class="edit-image-preview"><input type="text" id="editImageUrl_${p.id}" value="${escapeHtml(p.image || '')}" placeholder="رابط الصورة"><textarea id="editDescAr_${p.id}" rows="1">${escapeHtml(p.detailsAr || '')}</textarea><textarea id="editDescEn_${p.id}" rows="1">${escapeHtml(p.detailsEn || '')}</textarea><select id="editCategory_${p.id}">${categories.map(cat => `<option value="${cat}" ${p.category === cat ? 'selected' : ''}>${categoryNames[cat]}</option>`).join('')}</select><button onclick="saveEdit(${p.id})" style="background:#00cc88;">💾 حفظ</button><button onclick="closeEditForm(${p.id})" style="background:#ff4444;">إلغاء</button></div></td></tr>
        `).join('');
        
        products.forEach(p => {
            const editFileInput = document.getElementById(`editImageFile_${p.id}`);
            const editPreview = document.getElementById(`editImagePreview_${p.id}`);
            if (editFileInput) {
                editFileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) handleImageUpload(file, (data) => { editPreview.src = data; editPreview.style.display = "block"; window[`tempEditImage_${p.id}`] = data; });
                });
            }
        });
    }
    
    function moveProductUp(index) { if (index === 0) return; [products[index], products[index-1]] = [products[index-1], products[index]]; saveProducts(); renderProductsTable(); }
    function moveProductDown(index) { if (index === products.length-1) return; [products[index], products[index+1]] = [products[index+1], products[index]]; saveProducts(); renderProductsTable(); }
    function updateStock(id, newStock) { const p = products.find(p => p.id === id); if (p) { p.stock = parseInt(newStock); saveProducts(); renderProductsTable(); } }
    function openEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'table-row'; }
    function closeEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'none'; }
    
    async function saveEdit(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;
        p.nameAr = document.getElementById(`editNameAr_${id}`).value;
        p.nameEn = document.getElementById(`editNameEn_${id}`).value;
        p.priceOMR = parseFloat(document.getElementById(`editPrice_${id}`).value);
        p.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        p.stock = parseInt(document.getElementById(`editStock_${id}`).value) || 0;
        const tempImage = window[`tempEditImage_${id}`];
        if (tempImage) { p.image = tempImage; delete window[`tempEditImage_${id}`]; }
        else p.image = document.getElementById(`editImageUrl_${id}`).value;
        p.detailsAr = document.getElementById(`editDescAr_${id}`).value;
        p.detailsEn = document.getElementById(`editDescEn_${id}`).value;
        p.category = document.getElementById(`editCategory_${id}`).value;
        await saveProducts();
        closeEditForm(id);
        alert('✅ تم التحديث');
        renderProductsTable();
        updateProductsStats();
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id !== id);
            await saveProducts();
            renderProductsTable();
            updateProductsStats();
            alert('✅ تم الحذف');
        }
    }
    
    function handleImageUpload(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file, (data) => { currentImageData = data; preview.src = data; preview.style.display = "block"; });
        });
    }
    
    async function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const image = currentImageData || "";
        const desc = document.getElementById('newDesc').value.trim();
        if (!nameAr || !nameEn || isNaN(price)) { alert('يرجى ملء الاسم والسعر'); return; }
        const newProduct = { id: Date.now(), nameAr, nameEn, category, priceOMR: price, oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null, stock, image, detailsAr: desc, detailsEn: desc, order: products.length, sales: 0 };
        products.push(newProduct);
        await saveProducts();
        document.getElementById('newNameAr').value = ''; document.getElementById('newNameEn').value = ''; document.getElementById('newPrice').value = ''; document.getElementById('newOldPrice').value = ''; document.getElementById('newStock').value = '99'; document.getElementById('newDesc').value = ''; currentImageData = null; document.getElementById('newImagePreview').style.display = 'none';
        alert('✅ تم الإضافة');
        renderProductsTable();
        updateProductsStats();
    }
    
    // ==================== الطلبات ====================
    function loadOrders() {
        ordersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) orders = Object.values(data).sort((a,b) => b.id - a.id);
            else orders = [];
            renderOrdersTable();
            updateOrdersStats();
        });
    }
    
    function updateOrdersStats() {
        const pending = orders.filter(o => o.status === "قيد المعالجة").length;
        const processing = orders.filter(o => o.status === "جاري التجهيز").length;
        const completed = orders.filter(o => o.status === "تم التسليم").length;
        document.getElementById('ordersStats').innerHTML = `
            <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value">${pending}</div><div class="stat-label">قيد المعالجة</div></div>
            <div class="stat-card"><i class="fas fa-spinner"></i><div class="stat-value">${processing}</div><div class="stat-label">جاري التجهيز</div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value">${completed}</div><div class="stat-label">تم التسليم</div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${orders.length}</div><div class="stat-label">إجمالي الطلبات</div></div>
        `;
        document.getElementById('ordersStats').style.display = 'grid';
    }
    
    function renderOrdersTable() {
        const container = document.getElementById('ordersTable');
        if (orders.length === 0) { container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد طلبات حالياً</div>'; return; }
        
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>رقم الطلب</th><th>العميل</th><th>المنتج</th><th>السعر</th><th>التاريخ</th><th>الحالة</th><th>إجراءات</th> </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td>#${order.id}</td>
                                <td>${escapeHtml(order.customerName)}<br><small>${escapeHtml(order.customerEmail)}</small></td>
                                <td>${escapeHtml(order.productName)}</td>
                                <td>${order.convertedPrice || order.price}</td>
                                <td>${order.date || '-'}</td>
                                <td><span class="status-badge status-${order.status === 'قيد المعالجة' ? 'pending' : order.status === 'جاري التجهيز' ? 'processing' : 'completed'}">${order.status}</span></td>
                                <td>
                                    <select onchange="updateOrderStatus(${order.id}, this.value)" class="filter-select" style="padding:3px; font-size:0.7rem;">
                                        <option value="قيد المعالجة" ${order.status === 'قيد المعالجة' ? 'selected' : ''}>قيد المعالجة</option>
                                        <option value="جاري التجهيز" ${order.status === 'جاري التجهيز' ? 'selected' : ''}>جاري التجهيز</option>
                                        <option value="تم التسليم" ${order.status === 'تم التسليم' ? 'selected' : ''}>تم التسليم</option>
                                    </select>
                                    <button class="btn-sm btn-success" style="margin-top:5px;" onclick="sendOrderConfirmation(${order.id})"><i class="fab fa-whatsapp"></i> تأكيد</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    async function updateOrderStatus(orderId, newStatus) {
        const orderIndex = orders.findIndex(o => o.id === orderId);
        if (orderIndex !== -1) {
            orders[orderIndex].status = newStatus;
            await ordersRef.set(orders);
            renderOrdersTable();
            updateOrdersStats();
            alert('✅ تم تحديث حالة الطلب');
        }
    }
    
    async function sendOrderConfirmation(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        const message = `✅ *تأكيد طلب من xnesto*\n━━━━━━━━━━━━━━━━━━━━\n📦 *رقم الطلب:* #${order.id}\n🎮 *المنتج:* ${order.productName}\n💰 *السعر:* ${order.convertedPrice || order.price}\n👤 *العميل:* ${order.customerName}\n📧 *البريد:* ${order.customerEmail}\n━━━━━━━━━━━━━━━━━━━━\n📌 *حالة الطلب:* ${order.status}\n📞 للاستفسار: واتساب ${WA_NUMBER}`;
        window.open(`https://wa.me/${order.customerPhone || WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
        alert('✅ تم فتح محادثة واتساب مع العميل');
    }
    
    // ==================== قسائم الخصم ====================
    function loadCoupons() {
        couponsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) coupons = Object.values(data);
            else coupons = JSON.parse(JSON.stringify(defaultCoupons));
            renderCouponsTable();
        });
    }
    
    function saveCoupons() { couponsRef.set(coupons); }
    
    function renderCouponsTable() {
        const container = document.getElementById('couponsTable');
        if (coupons.length === 0) { container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد قسائم خصم</div>'; return; }
        
        container.innerHTML = `
            <div style="overflow-x:auto;">
                 <table>
                    <thead><tr><th>الكود</th><th>الخصم</th><th>الاستخدام</th><th>الحد الأقصى</th><th>تاريخ الانتهاء</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                    <tbody>
                        ${coupons.map(coupon => `
                            <tr>
                                <td><strong>${escapeHtml(coupon.code)}</strong></td>
                                <td>${coupon.discount}%</td>
                                <td>${coupon.used || 0}</td>
                                <td>${coupon.maxUses || '-'}</td>
                                <td>${coupon.expiry || '-'}</td>
                                <td>${coupon.active ? '<span class="status-badge status-completed">نشط</span>' : '<span class="status-badge status-pending">غير نشط</span>'}</td>
                                <td>
                                    <button class="btn-sm" onclick="toggleCouponStatus('${coupon.code}')">${coupon.active ? 'تعطيل' : 'تفعيل'}</button>
                                    <button class="btn-sm btn-danger" onclick="deleteCoupon('${coupon.code}')">حذف</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                 </table>
            </div>
        `;
    }
    
    function addCoupon() {
        const code = document.getElementById('couponCode').value.trim().toUpperCase();
        const discount = parseInt(document.getElementById('couponDiscount').value);
        const maxUses = parseInt(document.getElementById('couponMaxUses').value);
        const expiry = document.getElementById('couponExpiry').value;
        if (!code || isNaN(discount)) { alert('يرجى إدخال الكود ونسبة الخصم'); return; }
        if (coupons.find(c => c.code === code)) { alert('هذا الكود موجود مسبقاً'); return; }
        coupons.push({ code, discount, maxUses, used: 0, expiry, active: true });
        saveCoupons();
        renderCouponsTable();
        document.getElementById('couponCode').value = '';
        document.getElementById('couponDiscount').value = '10';
        document.getElementById('couponMaxUses').value = '50';
        document.getElementById('couponExpiry').value = '';
        alert('✅ تم إضافة قسيمة الخصم');
    }
    
    function toggleCouponStatus(code) {
        const coupon = coupons.find(c => c.code === code);
        if (coupon) { coupon.active = !coupon.active; saveCoupons(); renderCouponsTable(); }
    }
    
    function deleteCoupon(code) {
        if (confirm(`⚠️ حذف قسيمة ${code}؟`)) {
            coupons = coupons.filter(c => c.code !== code);
            saveCoupons();
            renderCouponsTable();
        }
    }
    
    // ==================== الزوار ====================
    function loadVisitorStats() {
        visitorsRef.once('value', (snapshot) => {
            const visitors = snapshot.val();
            const totalCount = visitors ? Object.keys(visitors).length : 0;
            const today = new Date().toDateString();
            database.ref('daily_visits/' + today.replace(/\s/g, '_')).once('value', (snap) => {
                const todayCount = snap.val() || 0;
                document.getElementById('visitorStats').innerHTML = `
                    <div class="stat-card"><i class="fas fa-globe"></i><div class="stat-value">${totalCount}</div><div class="stat-label">إجمالي الزوار</div></div>
                    <div class="stat-card"><i class="fas fa-calendar-day"></i><div class="stat-value">${todayCount}</div><div class="stat-label">زوار اليوم</div></div>
                `;
                document.getElementById('visitorStats').style.display = 'grid';
            });
        });
        visitorsRef.orderByKey().limitToLast(15).once('value', (snapshot) => {
            const visitors = snapshot.val();
            if (visitors) {
                const list = Object.values(visitors).reverse();
                document.getElementById('visitorsTable').innerHTML = `
                    <div style="overflow-x:auto;">
                         <table>
                            <thead><tr><th>الوقت</th><th>التاريخ</th><th>المتصفح</th><th>المصدر</th></tr></thead>
                            <tbody>${list.map(v => `<tr><td>${v.time || '-'}</td><td>${v.date || '-'}</td><td>${(v.userAgent || '').substring(0, 30)}...</td><td>${v.referrer === 'مباشر' ? '🔗 رابط' : '🔍 خارجي'}</td></tr>`).join('')}</tbody>
                         </table>
                    </div>
                `;
            }
        });
    }
    
    // ==================== التصنيفات ====================
    function loadCategories() {
        categoriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.categories && data.names) { categories = data.categories; categoryNames = data.names; }
            else { categories = ["games", "giftcards"]; categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" }; saveCategories(); }
            updateCategorySelect();
            updateFilterSelect();
            renderCategoriesList();
        });
    }
    
    function saveCategories() { categoriesRef.set({ categories, names: categoryNames }); }
    
    function updateCategorySelect() {
        const select = document.getElementById('newCategorySelect');
        if (select) select.innerHTML = categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
    }
    
    function updateFilterSelect() {
        const filterSelect = document.getElementById('filterCategory');
        if (filterSelect) {
            const current = filterSelect.value;
            filterSelect.innerHTML = '<option value="all">الكل</option>' + categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
            filterSelect.value = current;
        }
    }
    
    function renderCategoriesList() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `<div class="category-badge">${categoryNames[cat] || cat}<i class="fas fa-trash" onclick="deleteCategory('${cat}')"></i></div>`).join('');
    }
    
    function addNewCategory() {
        const newName = document.getElementById('newCategoryName').value.trim();
        if (!newName) { alert('الرجاء إدخال اسم التصنيف'); return; }
        const catKey = newName.replace(/\s/g, "_").toLowerCase();
        if (categories.includes(catKey)) { alert('هذا التصنيف موجود مسبقاً'); return; }
        categories.push(catKey);
        categoryNames[catKey] = newName;
        saveCategories();
        updateCategorySelect();
        updateFilterSelect();
        renderCategoriesList();
        document.getElementById('newCategoryName').value = '';
        alert('✅ تم إضافة التصنيف');
    }
    
    function deleteCategory(cat) {
        if (cat === "games" || cat === "giftcards") { alert("لا يمكن حذف التصنيفات الأساسية"); return; }
        if (confirm(`⚠️ حذف التصنيف "${categoryNames[cat]}"؟`)) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            saveCategories();
            updateCategorySelect();
            updateFilterSelect();
            renderCategoriesList();
            alert('✅ تم الحذف');
        }
    }
    
    function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); if (currentTab === 'products') renderProductsTable(); });
    document.getElementById('filterCategory').addEventListener('change', (e) => { filterCategory = e.target.value; if (currentTab === 'products') renderProductsTable(); });
    document.getElementById('addCategoryBtn').onclick = addNewCategory;
    
    checkSession();
    
    window.moveProductUp = moveProductUp;
    window.moveProductDown = moveProductDown;
    window.updateStock = updateStock;
    window.openEditForm = openEditForm;
    window.closeEditForm = closeEditForm;
    window.saveEdit = saveEdit;
    window.deleteProduct = deleteProduct;
    window.addProduct = addProduct;
    window.updateOrderStatus = updateOrderStatus;
    window.sendOrderConfirmation = sendOrderConfirmation;
    window.addCoupon = addCoupon;
    window.toggleCouponStatus = toggleCouponStatus;
    window.deleteCoupon = deleteCoupon;
    window.addNewCategory = addNewCategory;
    window.deleteCategory = deleteCategory;
</script>
</body>
</html>
