    { id: 6, nameAr: "بطاقة شحن سعودي", nameEn: "Saudi Gift Card", region: "Saudi Arabia", currency: "SAR", priceOMR: 4.5, icon: "🇸🇦", bgColor: "#2d6e4a", values: ["50ر.س", "100ر.س", "200ر.س"], msgAr: "أريد بطاقة شحن سعودي", msgEn: "I want Saudi Gift Card" },
    { id: 7, nameAr: "بطاقة شحن قطري", nameEn: "Qatar Gift Card", region: "Qatar", currency: "QAR", priceOMR: 4.5, icon: "🇶🇦", bgColor: "#4a6e2d", values: ["50ر.ق", "100ر.ق", "200ر.ق"], msgAr: "أريد بطاقة شحن قطري", msgEn: "I want Qatar Gift Card" },
    { id: 8, nameAr: "بطاقة شحن إماراتي", nameEn: "UAE Gift Card", region: "UAE", currency: "AED", priceOMR: 5, icon: "🇦🇪", bgColor: "#2d4a6e", values: ["50د.إ", "100د.إ", "200د.إ"], msgAr: "أريد بطاقة شحن إماراتي", msgEn: "I want UAE Gift Card" },
    { id: 9, nameAr: "بطاقة شحن كويتي", nameEn: "Kuwait Gift Card", region: "Kuwait", currency: "KWD", priceOMR: 6, icon: "🇰🇼", bgColor: "#5a3a2d", values: ["5د.ك", "10د.ك", "20د.ك"], msgAr: "أريد بطاقة شحن كويتي", msgEn: "I want Kuwait Gift Card" },
    { id: 10, nameAr: "بطاقة شحن بحريني", nameEn: "Bahrain Gift Card", region: "Bahrain", currency: "BHD", priceOMR: 5.5, icon: "🇧🇭", bgColor: "#4a2d5a", values: ["5د.ب", "10د.ب", "20د.ب"], msgAr: "أريد بطاقة شحن بحريني", msgEn: "I want Bahrain Gift Card" },
    { id: 11, nameAr: "بطاقة شحن عماني", nameEn: "Oman Gift Card", region: "Oman", currency: "OMR", priceOMR: 5, icon: "🇴🇲", bgColor: "#2d6e6e", values: ["5ر.ع", "10ر.ع", "20ر.ع", "50ر.ع"], msgAr: "أريد بطاقة شحن عماني", msgEn: "I want Oman Gift Card" }
  ];

  let currentUser = { type: "guest", name: "زائر" };
  let currentLang = "ar";
  let currentCurrency = "OMR";
  let currentPage = 1;
  let currentTab = "games";
  let searchQuery = "";
  let filteredGames = [...gamesData];
  const GAMES_PER_PAGE = 8;
  const ADMIN_PASSWORD = "admin123";

  const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, QAR: 9.46, EUR: 2.4, AED: 9.55 };
  const currencySymbols = { OMR: "ر.ع", USD: "$", SAR: "ر.س", QAR: "ر.ق", EUR: "€", AED: "د.إ" };
  const WA_NUMBER = "96879977100";

  function convertPrice(price, currency) {
    let converted = price * exchangeRates[currency];
    return converted.toFixed(2);
  }

  function updateSearchResults() {
    const query = searchQuery.trim().toLowerCase();
    if (query === "") {
      filteredGames = [...gamesData];
    } else {
      filteredGames = gamesData.filter(game => 
        game.nameAr.toLowerCase().includes(query) || 
        game.nameEn.toLowerCase().includes(query)
      );
    }
    currentPage = 1;
    document.getElementById("searchCount").innerHTML = filteredGames.length;
    if (currentTab === "games") renderGames();
  }

  function buildGameCard(game) {
    const card = document.createElement("div");
    card.className = "game-card";
    const gameName = currentLang === "ar" ? game.nameAr : game.nameEn;
    const specs = currentLang === "ar" ? game.specsAr : game.specsEn;
    const whatsappMsg = currentLang === "ar" ? game.msgAr : game.msgEn;
    const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(whatsappMsg)}`;
    const convertedPrice = convertPrice(game.priceOMR, currentCurrency);
    const currencySym = currencySymbols[currentCurrency];
    
    card.innerHTML = `
      <div class="game-image" style="background: linear-gradient(135deg, ${game.bgColor}, ${game.bgColor}cc);">
        <div class="game-icon-large">${game.icon}</div>
        <div class="game-badge">${game.version}</div>
      </div>
      <div class="card-info">
        <div class="game-title">${gameName}</div>
        <div class="game-version">${currentLang === "ar" ? "نسخة رقمية | تحميل فوري" : "Digital Edition"}</div>
        ${specs ? `<div class="game-specs"><i class="fas fa-info-circle"></i> ${specs}</div>` : ''}
        <div class="price">${convertedPrice} <span>${currencySym}</span></div>
        <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${currentLang === "ar" ? "اطلب الآن" : "Order Now"}</a>
      </div>
    `;
    return card;
  }

  function buildGiftCard(card) {
    const cardDiv = document.createElement("div");
    cardDiv.className = "giftcard-card";
    const cardName = currentLang === "ar" ? card.nameAr : card.nameEn;
    const regionText = currentLang === "ar" ? `المنطقة: ${card.region}` : `Region: ${card.region}`;
    const valuesText = currentLang === "ar" ? `الفئات: ${card.values.join(" | ")}` : `Values: ${card.values.join(" | ")}`;
    const whatsappMsg = currentLang === "ar" ? card.msgAr : card.msgEn;
    const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(whatsappMsg)}`;
    const convertedPrice = convertPrice(card.priceOMR, currentCurrency);
    const currencySym = currencySymbols[currentCurrency];
    
    cardDiv.innerHTML = `
      <div class="giftcard-image" style="background: linear-gradient(135deg, ${card.bgColor}, ${card.bgColor}cc);">
        <div class="giftcard-icon">${card.icon}</div>
        <div class="giftcard-badge">${card.currency}</div>
      </div>
      <div class="card-info">
        <div class="giftcard-title">${cardName}</div>
        <div class="giftcard-region">${regionText}</div>
        <div class="game-specs">${valuesText}</div>
        <div class="price">${convertedPrice} <span>${currencySym}</span></div>
        <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${currentLang === "ar" ? "اطلب الآن" : "Order Now"}</a>
      </div>
    `;
    return cardDiv;
  }

  function renderGames() {
    const container = document.getElementById("gamesSection");
    if (!container) return;
    container.innerHTML = "";
    const totalPages = Math.ceil(filteredGames.length / GAMES_PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * GAMES_PER_PAGE;
    const pageGames = filteredGames.slice(start, start + GAMES_PER_PAGE);
    pageGames.forEach(game => container.appendChild(buildGameCard(game)));
    renderPagination();
  }

  function renderGiftCards() {
    const container = document.getElementById("giftcardsSection");
    if (!container) return;
    container.innerHTML = "";
    giftCardsData.forEach(card => container.appendChild(buildGiftCard(card)));
  }

  function renderPagination() {
    const pagContainer = document.getElementById("paginationContainer");
    if (!pagContainer) return;
    pagContainer.innerHTML = "";
    const totalPages = Math.ceil(filteredGames.length / GAMES_PER_PAGE);
    if (totalPages <= 1) return;
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === currentPage ? " active" : "");
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; renderGames(); };
      pagContainer.appendChild(btn);
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    const gamesSection = document.getElementById("gamesSection");
    const giftcardsSection = document.getElementById("giftcardsSection");
    const pagination = document.getElementById("paginationContainer");
    
    if (tab === "games") {
      gamesSection.style.display = "grid";
      giftcardsSection.style.display = "none";
      pagination.style.display = "flex";
      renderGames();
    } else {
      gamesSection.style.display = "none";
      giftcardsSection.style.display = "grid";
      pagination.style.display = "none";
      renderGiftCards();
    }
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
      if (btn.getAttribute("data-tab") === tab) btn.classList.add("active");
      else btn.classList.remove("active");
    });
  }

  function updateUIForUser() {
    const authDiv = document.getElementById("authButtons");
    const welcomeMsg = document.getElementById("welcomeMsg");
    
    if (currentUser.type === "admin") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-crown"></i> ${currentLang === "ar" ? "مرحباً Admin" : "Welcome Admin"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 مرحباً بك أيها المدير! يمكنك تعديل الأسعار والحذف والإضافة" : "🎮 Welcome Admin! You can edit prices, delete and add games";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else if (currentUser.type === "user") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentLang === "ar" ? "مرحباً عميل" : "Welcome User"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 أهلاً بك! يمكنك تصفح الألعاب والطلب عبر واتساب" : "🎮 Welcome! You can browse games and order via WhatsApp";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else {
      authDiv.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user"></i> ${currentLang === "ar" ? "تسجيل دخول" : "Login"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 xnesto - ألعاب PS4/PS5 – بطاقات شحن – أسعار محدثة – رصيد فوري" : "🎮 xnesto - PS4/PS5 Games – Gift Cards – Updated Prices – Instant Credit";
      document.getElementById("showLoginBtn")?.addEventListener("click", () => showLoginModal());
    }
  }

  function logout() {
    currentUser = { type: "guest", name: "زائر" };
    updateUIForUser();
    document.getElementById("adminPanel").classList.remove("active");
  }

  function showLoginModal() {
    document.getElementById("loginModal").classList.add("active");
  }

  function closeLoginModal() {
    document.getElementById("loginModal").classList.remove("active");
    document.getElementById("loginError").innerHTML = "";
    document.getElementById("adminPassword").value = "";
  }

  function handleLogin() {
    const userType = document.getElementById("userTypeSelect").value;
    if (userType === "admin") {
      const password = document.getElementById("adminPassword").value;
      if (password === ADMIN_PASSWORD) {
        currentUser = { type: "admin", name: "Admin" };
        updateUIForUser();
        closeLoginModal();
        document.getElementById("adminPanel").classList.add("active");
      } else {
        document.getElementById("loginError").innerHTML = currentLang === "ar" ? "❌ كلمة السر غير صحيحة" : "❌ Incorrect password";
      }
    } else {
      currentUser = { type: "user", name: "عميل" };
      updateUIForUser();
      closeLoginModal();
    }
  }

  function initEvents() {
    document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
    document.getElementById("closeLoginBtn")?.addEventListener("click", closeLoginModal);
    document.getElementById("loginSubmitBtn")?.addEventListener("click", handleLogin);
    document.getElementById("closeAdminBtn")?.addEventListener("click", () => {
      document.getElementById("adminPanel").classList.remove("active");
    });
    document.getElementById("userTypeSelect")?.addEventListener("change", (e) => {
      document.getElementById("adminPasswordField").style.display = e.target.value === "admin" ? "block" : "none";
    });
    
    // إغلاق النافذة عند الضغط خارجها
    document.getElementById("loginModal")?.addEventListener("click", (e) => {
      if (e.target === document.getElementById("loginModal")) closeLoginModal();
    });
    document.getElementById("adminPanel")?.addEventListener("click", (e) => {
      if (e.target === document.getElementById("adminPanel")) document.getElementById("adminPanel").classList.remove("active");
    });
    
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.getAttribute("data-lang");
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
        updateUIForUser();
        if (currentTab === "games") renderGames();
        else renderGiftCards();
        updateTexts();
      });
    });
    
    document.getElementById("currencySelect")?.addEventListener("change", (e) => {
      currentCurrency = e.target.value;
      if (currentTab === "games") renderGames();
      else renderGiftCards();
    });
    
    document.getElementById("searchInput")?.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      updateSearchResults();
    });
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.getAttribute("data-tab")));
    });
  }

  function updateTexts() {
    document.getElementById("currencyLabel").innerText = currentLang === "ar" ? "العملة:" : "Currency:";
    document.getElementById("loginBtnText").innerText = currentLang === "ar" ? "تسجيل دخول" : "Login";
  }

  function init() {
    initEvents();
    updateUIForUser();
    switchTab("games");
    updateTexts();
  }
  
  init();
</script>
</body>
</html>
