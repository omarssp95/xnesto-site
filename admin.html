<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم xnesto 🛠️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0a0a1a; font-family: 'Cairo', sans-serif; color: white; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e3a; padding: 25px; border-radius: 20px; border: 2px solid #ffaa44; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ffaa44; margin-bottom: 25px; font-size: 1.8rem; }
        .product-item { background: #2a2a4a; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #444; transition: 0.3s; }
        .product-item:hover { border-color: #ffaa44; }
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #0a0a1a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        .save-btn { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2rem; margin-top: 20px; transition: 0.3s; }
        .save-btn:hover { background: #218838; transform: translateY(-2px); }
        .save-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
        #status { text-align: center; margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة تحكم المتجر 🛠️</h2>
        <div id="loginArea">
            <input type="password" id="passInput" placeholder="أدخل كلمة السر">
            <button onclick="checkPass()" class="save-btn" style="background:#ffaa44; color:#000;">دخول الإدارة</button>
        </div>
        <div id="adminArea" style="display:none;">
            <p style="text-align:center; color:#ffaa44; margin-bottom:20px;">قم بتعديل الأسعار والأسماء ثم اضغط حفظ في الأسفل</p>
            <div id="productsList">جاري تحميل المنتجات...</div>
            <button id="saveBtn" class="save-btn" onclick="saveData()">✅ حفظ التغييرات لجميع العملاء</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = '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';
        const REPO = 'omarssp95/xnesto-site';
        let productsData = null;

        function checkPass() {
            if (document.getElementById('passInput').value === 'ssp1995') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminArea').style.display = 'block';
                loadData();
            } else { alert('كلمة سر خاطئة!'); }
        }

        async function loadData() {
            try {
                const res = await fetch(`products.json?t=${Date.now()}`);
                productsData = await res.json();
                render();
            } catch (e) { document.getElementById('productsList').innerText = "خطأ في تحميل ملف products.json"; }
        }

        function render() {
            const list = document.getElementById('productsList');
            let html = '<h3 style="color:#ffaa44; border-bottom:1px solid #444; padding-bottom:10px;">🎮 الألعاب:</h3>';
            productsData.games.forEach((p, i) => {
                html += `<div class="product-item">
                    <label>اسم اللعبة:</label>
                    <input type="text" value="${p.nameAr}" onchange="productsData.games[${i}].nameAr = this.value; productsData.games[${i}].nameEn = this.value; productsData.games[${i}].msgAr = 'أريد ' + this.value">
                    <label>السعر (ر.ع):</label>
                    <input type="number" step="0.1" value="${p.priceOMR}" onchange="productsData.games[${i}].priceOMR = parseFloat(this.value)">
                </div>`;
            });
            html += '<h3 style="color:#ffaa44; border-bottom:1px solid #444; padding-bottom:10px; margin-top:30px;">💳 بطاقات الشحن:</h3>';
            productsData.giftcards.forEach((p, i) => {
                html += `<div class="product-item">
                    <label>اسم البطاقة:</label>
                    <input type="text" value="${p.nameAr}" onchange="productsData.giftcards[${i}].nameAr = this.value; productsData.giftcards[${i}].nameEn = this.value; productsData.giftcards[${i}].msgAr = 'أريد ' + this.value">
                    <label>السعر (ر.ع):</label>
                    <input type="number" step="0.1" value="${p.priceOMR}" onchange="productsData.giftcards[${i}].priceOMR = parseFloat(this.value)">
                </div>`;
            });
            list.innerHTML = html;
        }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.style.background = "rgba(255,170,68,0.1)";
            status.style.color = "#ffaa44";
            status.innerText = "⏳ جاري الحفظ في GitHub... يرجى الانتظار ثوانٍ";

            try {
                const url = `https://api.github.com/repos/${REPO}/contents/products.json`;
                const fileRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const fileData = await fileRes.json();

                productsData.version = "v_" + Date.now();
                
                // تشفير البيانات بشكل صحيح لـ GitHub (Base64)
                const jsonStr = JSON.stringify(productsData, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(jsonStr)));

                const updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "تحديث المنتجات من لوحة التحكم",
                        content: encodedContent,
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) {
                    status.style.background = "rgba(40,167,69,0.1)";
                    status.style.color = "#28a745";
                    status.innerText = "✅ مبروك! تم الحفظ بنجاح. التعديلات ستظهر للجميع الآن.";
                    alert("تم الحفظ بنجاح! يمكنك الآن فتح الموقع العادي لرؤية التغييرات.");
                } else { 
                    const errorInfo = await updateRes.json();
                    throw new Error(errorInfo.message); 
                }
            } catch (e) {
                status.style.background = "rgba(220,53,69,0.1)";
                status.style.color = "#dc3545";
                status.innerText = "❌ فشل الحفظ: " + e.message;
                console.error(e);
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
