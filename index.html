<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 XNESTO STORE - متجر PS5 عُمان 🎮</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* نفس الـ CSS الخاص بك - انسخه هنا للاختصار */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%); font-family: 'Cairo', sans-serif; color: #f0f0ff; padding: 1rem; }
    /* ... باقي الـ CSS كما هو في كودك الأصلي ... */
  </style>
</head>
<body>
  <!-- نفس HTML الخاص بك -->

  <script>
    // الكود المُحسَّن - يعمل بدون GitHub تمامًا!
    let products = []; // مصفوفة المنتجات
    let currentLang = "ar", currentCurrency = "OMR", adminMode = false;
    
    // بيانات المنتجات الثابتة + الحفظ المحلي
    const defaultProducts = [
      { id: 1, nameAr: "Assassin's Creed Shadows", nameEn: "Assassin's Creed Shadows", category: "games", price: 14, oldPrice: 20, image: "https://store.playstation.com/store/api/chihiro/00_09_12/image?w=320", descAr: "🏷️ الحجم: 65GB", descEn: "📦 Size: 65GB" },
      // أضف باقي الألعاب + بطاقات الشحن هنا (12+ لعبة كما في كودك)
      { id: 101, nameAr: "بطاقة شحن أمريكي", nameEn: "US Gift Card", category: "giftcards", price: 5, oldPrice: 6, image: "https://i.imgur.com/giftcard-us.png", descAr: "10$ | 25$ | 50$", descEn: "10$ | 25$ | 50$" }
    ];
    
    // تحميل/حفظ محلي (يعمل للجميع!)
    function loadProducts() {
      const saved = localStorage.getItem('xnesto_products_v2');
      if (saved) {
        products = JSON.parse(saved);
      } else {
        products = [...defaultProducts];
        saveProducts();
      }
      renderProducts();
    }
    
    function saveProducts() {
      localStorage.setItem('xnesto_products_v2', JSON.stringify(products));
      console.log('✅ تم حفظ المنتجات محليًا');
    }
    
    // باقي الدوال كما هي: renderProducts, updateProduct, إلخ
    async function updateProduct(id, btnElement) {
      const product = products.find(p => p.id === id);
      const newPrice = parseFloat(btnElement.closest('.product-card').querySelector('.edit-price-input').value);
      const newImage = btnElement.closest('.product-card').querySelector('.edit-image-url').value.trim();
      
      if (!isNaN(newPrice)) product.price = newPrice;
      if (newImage) product.image = newImage;
      
      saveProducts(); // حفظ فوري!
      renderProducts();
      alert('✅ تم تحديث المنتج للجميع!');
    }
    
    // إضافة منتج جديد مع saveProducts()
    // حذف مع saveProducts()
    
    // باقي الكود (setLang, setCurrency, buyProduct, toggleAdmin مع كلمة سر جديدة "xnesto2026")
    const ADMIN_PASSWORD = "xnesto2026"; // غيّرتها!
    
    // تهيئة
    loadProducts();
  </script>
</body>
</html>
