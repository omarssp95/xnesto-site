<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="admin.js"></script>
  <title>xnesto – متجر الألعاب وبطاقات الشحن | PS4/PS5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* كود التصميم الأصلي */
    html { font-size: 14px; }
    @media (min-width: 768px) { html { font-size: 15px; } }
    @media (min-width: 1200px) { html { font-size: 16px; } }
    .device-bar { background: #07071a; border-bottom: 1px solid rgba(255,170,68,0.2); padding: 6px 16px; display: flex; justify-content: center; gap: 6px; position: sticky; top: 0; z-index: 9999; }
    .device-btn { background: #1e1e3a; border: 1px solid rgba(255,170,68,0.2); color: #888; padding: 5px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-family: 'Cairo', sans-serif; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
    .device-btn.active { background: #ffaa44; color: #0a0a1a; border-color: #ffaa44; font-weight: 700; }
    body { background: #0a0a1a; font-family: 'Cairo', sans-serif; color: #f0f0ff; margin: 0; min-height: 100vh; }
    .header { text-align: center; background: linear-gradient(135deg, #0f0f2a, #0a0a1f); padding: 2rem 1rem; border-radius: 0 0 2rem 2rem; border-bottom: 2px solid #ffaa44; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .product-card { background: #1e1e3a; border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(255,170,68,0.2); transition: 0.3s; }
    .product-card:hover { transform: translateY(-5px); border-color: #ffaa44; }
    .product-image { width: 100%; height: 180px; object-fit: cover; background: #0a0a1a; }
    .product-info { padding: 1.2rem; }
    .product-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
    .price-tag { color: #ffaa44; font-size: 1.3rem; font-weight: 800; }
    .old-price { text-decoration: line-through; color: #888; font-size: 0.9rem; margin-right: 0.5rem; }
    .btn-buy { background: #ffaa44; color: #0a0a1a; border: none; padding: 0.8rem; width: 100%; border-radius: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
    .btn-buy:hover { background: #ffcc88; }
    .admin-panel { background: rgba(255,170,68,0.1); border: 1px dashed #ffaa44; padding: 1rem; margin: 1rem; border-radius: 1rem; display: none; }
    .admin-active .admin-panel { display: block; }
  </style>
</head>
<body class="view-mobile">
  <div class="device-bar">
    <button class="device-btn active" onclick="setView('mobile')"><i class="fas fa-mobile-alt"></i> جوال</button>
    <button class="device-btn" onclick="setView('desktop')"><i class="fas fa-desktop"></i> كمبيوتر</button>
  </div>

  <header class="header">
    <h1>xnesto 🎮</h1>
    <p>متجر الألعاب وبطاقات الشحن الأسرع والأرخص 🚀</p>
    <button onclick="loginAdmin()" style="background:transparent; border:1px solid #444; color:#666; padding:5px 10px; border-radius:10px; margin-top:10px; cursor:pointer;">دخول الإدارة</button>
  </header>

  <div id="adminPanel" class="admin-panel">
    <h3>لوحة تحكم المسؤول 🛠️</h3>
    <button onclick="addNewProduct()" style="padding:10px; background:#ffaa44; border:none; border-radius:10px; cursor:pointer;">➕ إضافة منتج جديد</button>
    <button onclick="logoutAdmin()" style="padding:10px; background:#ff4444; color:white; border:none; border-radius:10px; cursor:pointer;">خروج</button>
  </div>

  <div id="productsContainer" class="products-grid">
    <!-- المنتجات تظهر هنا -->
  </div>

  <script>
    let products = [];
    let currentUser = { type: 'guest' };

    // جلب البيانات من GitHub
    async function loadProducts() {
      const url = `products.json?t=${new Date().getTime()}`;
      try {
        const response = await fetch(url);
        if (response.ok) {
          const data = await response.json();
          products = [...data.games, ...data.giftcards];
          renderProducts();
        }
      } catch (e) {
        console.error("خطأ في جلب البيانات:", e);
      }
    }

    function renderProducts() {
      const container = document.getElementById('productsContainer');
      container.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.image || 'https://via.placeholder.com/300x180'}" class="product-image">
          <div class="product-info">
            <div class="product-title">${p.nameAr}</div>
            <div class="price-section">
              <span class="price-tag">${p.priceOMR} ر.ع</span>
              ${p.oldPrice ? `<span class="old-price">${p.oldPrice} ر.ع</span>` : ''}
            </div>
            <button class="btn-buy" onclick="orderProduct(${p.id})">اطلب الآن 🛒</button>
            ${currentUser.type === 'admin' ? `<button onclick="editProduct(${p.id})" style="margin-top:5px; width:100%; padding:5px; background:#444; color:white; border:none; border-radius:5px; cursor:pointer;">تعديل ✏️</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function setView(view) {
      document.body.className = view === 'mobile' ? 'view-mobile' : 'view-desktop';
      document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function loginAdmin() {
      const pass = prompt("أدخل كلمة سر المسؤول:");
      if (pass === "ssp1995") {
        currentUser.type = 'admin';
        document.body.classList.add('admin-active');
        renderProducts();
        alert("مرحباً بك أيها المسؤول!");
      } else {
        alert("كلمة سر خاطئة!");
      }
    }

    function logoutAdmin() {
      currentUser.type = 'guest';
      document.body.classList.remove('admin-active');
      renderProducts();
    }

    function orderProduct(id) {
      const p = products.find(x => x.id === id);
      const msg = encodeURIComponent(`مرحباً xnesto، أريد طلب: ${p.nameAr}`);
      window.open(`https://wa.me/96879977100?text=${msg}`, '_blank');
    }

    // هذه الدالة هي التي تربط مع ملف admin.js لتحديث GitHub
    async function saveChanges() {
      if (typeof updateGitHubProducts === "function") {
        await updateGitHubProducts(products);
      } else {
        alert("خطأ: ملف admin.js غير موجود أو لم يتم رفعه بشكل صحيح!");
      }
    }

    window.onload = loadProducts;
  </script>
</body>
</html>
