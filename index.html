            td1:"اللعب بحسابك الخاص", td2:"اللعب بدون إنترنت", td3:"تجميع التروفيز", gTitle:"ℹ️ شرح التفعيل:",
            gp:"الأساسية PS5: فعل الحساب كجهاز رئيسي لكي تلعب من حسابك الخاص وتجمع التروفيز على جهاز PS5.",
            gs:"الثانوية PS5: العب من حساب المتجر مباشرة (يتطلب إنترنت دائماً) ولا تفعله كجهاز رئيسي.",
            gps4:"نسخة PS4: فعل الحساب كجهاز رئيسي على PS4 لكي تلعب من حسابك الخاص وتجمع التروفيز.",
            tTitle:"📋 شروط المتجر:", cancel:"إلغاء", confirm:"تأكيد واتساب",
            msg: "🛒 طلب شراء جديد\n🎮 المنتج: {name}\n📂 النوع: {type}\n💰 السعر: {price}\n━━━━━━━━━━━━\n✅ أوافق على شروط المتجر."
        },
        en: {
            heroSub: "Instant Account Registration - Receive in Minutes", b1:"Best Prices", b2:"Instant Delivery", b3:"24/7 Support",
            s1:"100% Secure Payment", s2:"Fast Delivery", s3:"7 Days Warranty", search:"Search for a game or card...",
            all:"🔥 All", order:"Order Now", out:"Out of Stock", modalHint:"Please select the required version:",
            lblP:"Primary PS5", lblS:"Secondary PS5", lblPS4:"PS4 Version", thF:"Feature", thP:"Primary", thS:"Secondary", thPS4:"PS4",
            td1:"Play on your account", td2:"Play offline", td3:"Collect trophies", gTitle:"ℹ️ Activation Guide:",
            gp:"Primary PS5: Activate as main console to play on your profile and earn trophies on PS5.",
            gs:"Secondary PS5: Play directly from store account (requires internet) - do not activate as main.",
            gps4:"PS4 Version: Activate as main console on PS4 to play on your profile and earn trophies.",
            tTitle:"📋 Store Terms:", cancel:"Cancel", confirm:"Confirm WhatsApp",
            msg: "🛒 New Order\n🎮 Product: {name}\n📂 Type: {type}\n💰 Price: {price}\n━━━━━━━━━━━━\n✅ I agree to the terms."
        }
    };

    function init() {
        db.ref('categories').on('value', snap => { categories = snap.val() || {}; renderTabs(); });
        db.ref('products').on('value', snap => { products = snap.val() || []; renderProducts(); });
        db.ref('settings').on('value', snap => {
            settings = snap.val() || {};
            const list = document.getElementById('termsList');
            list.innerHTML = (settings.terms || "").split('\n').map(t => `<li>${t}</li>`).join('');
        });
        updateUI();
        db.ref('visits').transaction(v => (v || 0) + 1);
    }

    function setLang(lang) {
        currentLang = lang;
        document.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('btnAr').classList.toggle('active', lang === 'ar');
        document.getElementById('btnEn').classList.toggle('active', lang === 'en');
        updateUI(); renderTabs(); renderProducts();
    }

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('hero-sub').innerText = t.heroSub;
        ['b1','b2','b3','s1','s2','s3'].forEach(id => document.getElementById(id).innerText = t[id]);
        document.getElementById('searchInput').placeholder = t.search;
        document.getElementById('modalHint').innerText = t.modalHint;
        ['lblP','lblS','lblPS4','thF','thP','thS','thPS4','td1','td2','td3','gTitle','tTitle','btnCancel','btnConfirm'].forEach(id => {
            document.getElementById(id).innerText = t[id];
        });
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        let html = `<button class="tab-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">${i18n[currentLang].all}</button>`;
        Object.entries(categories).forEach(([key, name]) => {
            html += `<button class="tab-btn ${currentCategory === key ? 'active' : ''}" onclick="setCategory('${key}')">${name}</button>`;
        });
        container.innerHTML = html;
    }

    function renderProducts() {
        const container = document.getElementById('productsContainer');
        const query = document.getElementById('searchInput').value.toLowerCase();
        const t = i18n[currentLang];
        
        const filtered = products.filter(p => {
            const matchesSearch = p.nameAr.toLowerCase().includes(query);
            const matchesCat = currentCategory === 'all' || p.category === currentCategory;
            return matchesSearch && matchesCat;
        });

        container.innerHTML = filtered.map(p => {
            const out = (p.stock <= 0);
            const isGame = (p.category === 'games');
            const p1 = p.pricePrimary || p.priceOMR;
            const p2 = p.priceSecondary || (p.priceOMR * 0.6).toFixed(1);
            const p3 = p.pricePS4 || (p.priceOMR * 0.7).toFixed(1);

            let pricing = isGame ? `
                <div class="price-container">
                    <div class="price-row"><span class="price-label">${t.lblP}:</span><span class="price-val primary">${formatPrice(p1)}</span></div>
                    <div class="price-row"><span class="price-label">${t.lblS}:</span><span class="price-val">${formatPrice(p2)}</span></div>
                    <div class="price-row"><span class="price-label">${t.lblPS4}:</span><span class="price-val ps4">${formatPrice(p3)}</span></div>
                </div>` : `<div class="price-container" style="align-items:center;"><span class="price-val" style="font-size:1.2rem;">${formatPrice(p.priceOMR)}</span></div>`;

            return `
                <div class="product-card">
                    ${out ? `<div class="out-of-stock-overlay"><div class="out-of-stock-badge">${t.out}</div></div>` : ''}
                    <div class="product-image" style="background-image:url('${p.image}')">
                        <div class="product-badge">${categories[p.category] || ''}</div>
                    </div>
                    <div class="card-info">
                        <div class="product-title">${p.nameAr}</div>
                        ${pricing}
                        <button class="btn-wa ${out ? 'disabled' : ''}" onclick="${out ? '' : `openModal('${p.id}')`}">
                            <i class="fab fa-whatsapp"></i> ${out ? t.out : t.order}
                        </button>
                    </div>
                </div>`;
        }).join('');
    }

    function formatPrice(omr) { return `${symbols[currentCurrency]} ${(omr * rates[currentCurrency]).toFixed(2)}`; }
    function updateCurrency(cur) { currentCurrency = cur; renderProducts(); }
    function setCategory(cat) { currentCategory = cat; renderTabs(); renderProducts(); }
    function filterProducts() { renderProducts(); }

    function openModal(id) {
        selectedProduct = products.find(p => p.id == id);
        document.getElementById('modalTitle').innerText = selectedProduct.nameAr;
        if (selectedProduct.category === 'games') {
            document.getElementById('gameLicenseSection').style.display = 'block';
            const p1 = selectedProduct.pricePrimary || selectedProduct.priceOMR;
            const p2 = selectedProduct.priceSecondary || (selectedProduct.priceOMR * 0.6).toFixed(1);
            const p3 = selectedProduct.pricePS4 || (selectedProduct.priceOMR * 0.7).toFixed(1);
            document.getElementById('modalPriceP').innerText = formatPrice(p1);
            document.getElementById('modalPriceS').innerText = formatPrice(p2);
            document.getElementById('modalPricePS4').innerText = formatPrice(p3);
            selectLicense('primary');
        } else { document.getElementById('gameLicenseSection').style.display = 'none'; }
        document.getElementById('purchaseModal').style.display = 'flex';
    }

    function selectLicense(type) {
        selectedLicense = type;
        ['primary','secondary','ps4'].forEach(t => document.getElementById('card-'+t).classList.toggle('active', t === type));
        const t = i18n[currentLang];
        document.getElementById('guideText').innerText = type === 'primary' ? t.gp : (type === 'secondary' ? t.gs : t.gps4);
    }

    function closeModal() { document.getElementById('purchaseModal').style.display = 'none'; }

    function confirmOrder() {
        const p = selectedProduct; const t = i18n[currentLang];
        let price = p.priceOMR, typeText = currentLang === 'ar' ? 'طلب' : 'Order';
        if (p.category === 'games') {
            price = selectedLicense === 'primary' ? (p.pricePrimary || p.priceOMR) : (selectedLicense === 'secondary' ? (p.priceSecondary || p.priceOMR * 0.6) : (p.pricePS4 || p.priceOMR * 0.7));
            typeText = t[selectedLicense === 'primary' ? 'lblP' : (selectedLicense === 'secondary' ? 'lblS' : 'lblPS4')];
        }
        const msg = t.msg.replace('{name}', p.nameAr).replace('{type}', typeText).replace('{price}', formatPrice(price));
        window.open(`https://wa.me/${settings.whatsapp || '96879977100'}?text=${encodeURIComponent(msg)}`, '_blank');
        closeModal();
    }

    init();
</script>
</body>
</html>
