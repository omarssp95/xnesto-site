    const giftCards = [
        { id: 101, nameAr: "🇺🇸 بطاقة أمريكي", nameEn: "🇺🇸 US Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Flag_of_the_United_States.svg/30px-Flag_of_the_United_States.svg.png", detailsAr: "10$ | 25$ | 50$ | 100$", detailsEn: "10$ | 25$ | 50$ | 100$", order: 101 },

        { id: 103, nameAr: "🇦🇪 بطاقة إماراتي", nameEn: "🇦🇪 UAE Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_United_Arab_Emirates.svg/30px-Flag_of_the_United_Arab_Emirates.svg.png", detailsAr: "50د.إ | 100د.إ | 200د.إ", detailsEn: "50 AED | 100 AED | 200 AED", order: 103 },

        { id: 105, nameAr: "🇰🇼 بطاقة كويتي", nameEn: "🇰🇼 Kuwait Card", category: "giftcards", priceOMR: 6, oldPrice: 7, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Flag_of_Kuwait.svg/30px-Flag_of_Kuwait.svg.png", detailsAr: "5د.ك | 10د.ك | 20د.ك", detailsEn: "5 KWD | 10 KWD | 20 KWD", order: 105 },
        { id: 106, nameAr: "🇧🇭 بطاقة بحريني", nameEn: "🇧🇭 Bahrain Card", category: "giftcards", priceOMR: 5.5, oldPrice: 6.5, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Flag_of_Bahrain.svg/30px-Flag_of_Bahrain.svg.png", detailsAr: "5د.ب | 10د.ب | 20د.ب", detailsEn: "5 BHD | 10 BHD | 20 BHD", order: 106 },
        { id: 107, nameAr: "🇴🇲 بطاقة عماني", nameEn: "🇴🇲 Oman Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Flag_of_Oman.svg/30px-Flag_of_Oman.svg.png", detailsAr: "5ر.ع | 10ر.ع | 20ر.ع", detailsEn: "5 OMR | 10 OMR | 20 OMR", order: 107 }
    ];
    
    const allDefaultProducts = [...defaultGames, ...giftCards];
    
    function getStockStatus(stock) {
        if (stock <= 0) return { text: 'نفذت', class: 'status-outstock' };
        if (stock < 10) return { text: 'متبقي قليل', class: 'status-lowstock' };
        return { text: 'متوفر', class: 'status-instock' };
    }
    
    function loadProducts() {
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data) && data.length > 0) {
                products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
            } else {
                products = JSON.parse(JSON.stringify(allDefaultProducts));
                products.forEach((p, idx) => { p.order = idx; });
                productsRef.set(products);
            }
            renderTable();
        });
    }
    
    function saveProducts() { 
        productsRef.set(products)
            .then(() => console.log('✅ تم حفظ المنتجات'))
            .catch(err => console.error('❌ خطأ:', err));
    }
    
    function updateOrder() {
        products.forEach((p, idx) => { p.order = idx; });
        saveProducts();
        renderTable();
    }
    
    function moveProductToPosition(productId, newPosition) {
        const currentIndex = products.findIndex(p => p.id == productId);
        if (currentIndex === -1) return;
        let targetIndex = newPosition - 1;
        if (targetIndex < 0) targetIndex = 0;
        if (targetIndex >= products.length) targetIndex = products.length - 1;
        if (currentIndex === targetIndex) return;
        const product = products[currentIndex];
        products.splice(currentIndex, 1);
        products.splice(targetIndex, 0, product);
        updateOrder();
    }
    
    function moveProductUp(index) {
        if (index === 0) return;
        const temp = products[index];
        products[index] = products[index - 1];
        products[index - 1] = temp;
        updateOrder();
    }
    
    function moveProductDown(index) {
        if (index === products.length - 1) return;
        const temp = products[index];
        products[index] = products[index + 1];
        products[index + 1] = temp;
        updateOrder();
    }
    
    function updateStock(id, newStock) {
        const product = products.find(p => p.id == id);
        if (product) { product.stock = parseInt(newStock); saveProducts(); renderTable(); }
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => (p.nameAr || '').toLowerCase().includes(searchQuery) || (p.nameEn || '').toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function renderTable() {
        const filtered = getFilteredProducts();
        const container = document.getElementById('productsTable');
        if (filtered.length === 0) { container.innerHTML = '<div class="loading">لا توجد منتجات</div>'; return; }
        
        container.innerHTML = `
            <div style="overflow-x:auto;">
                 <table>
                    <thead>
                        <tr>
                            <th>الترتيب</th>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>السعر (ر.ع)</th>
                            <th>الكمية</th>
                            <th>الحالة</th>
                            <th>التصنيف</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                 </table>
            </div>
        `;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = filtered.map((p, idx) => {
            const originalIndex = products.findIndex(prod => prod.id === p.id);
            const currentOrder = originalIndex + 1;
            const stockStatus = getStockStatus(p.stock || 0);
            
            return `
                <tr id="row-${p.id}">
                    <td>
                        <div style="display:flex; gap:5px; align-items:center; justify-content:center; flex-wrap:wrap;">
                            <span class="order-number">#${currentOrder}</span>
                            <div style="display:flex; gap:3px;">
                                <button class="move-top-btn" onclick="moveProductUp(${originalIndex})" ${originalIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>⬆️</button>
                                <button class="move-bottom-btn" onclick="moveProductDown(${originalIndex})" ${originalIndex === products.length-1 ? 'disabled style="opacity:0.5;"' : ''}>⬇️</button>
                            </div>
                            <input type="number" id="order_input_${p.id}" value="${currentOrder}" min="1" max="${products.length}" step="1" style="width:60px; background:#1e1e3a; border:1px solid #ffaa44; border-radius:1rem; padding:3px; text-align:center; color:white;" onchange="moveProductToPosition(${p.id}, this.value)">
                        </div>
                    </td>
                    <td><img src="${p.image || ''}" width="45" height="45" style="border-radius:8px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/45'"></td>
                    <td><strong>${escapeHtml(p.nameAr)}</strong><br><small style="opacity:0.7;">${escapeHtml(p.nameEn)}</small></td>
                    <td>${p.priceOMR} ر.ع${p.oldPrice ? `<br><span style="text-decoration:line-through; font-size:0.6rem;">${p.oldPrice}</span>` : ''}</td>
                    <td><input type="number" class="stock-input" id="stock_${p.id}" value="${p.stock || 0}" min="0" step="1" onchange="updateStock(${p.id}, this.value)"></td>
                    <td><span class="stock-status ${stockStatus.class}">${stockStatus.text}</span></td>
                    <td>${categoryNames[p.category] || p.category}</td>
                    <td><button class="edit-btn" onclick="openEditForm(${p.id})">✏️ تعديل</button><button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ حذف</button></td>
                </tr>
                <tr id="edit-form-${p.id}" style="display:none;">
                    <td colspan="8">
                        <div class="product-edit-form">
                            <div class="edit-field"><label>📝 الاسم بالعربية *</label><input type="text" id="editNameAr_${p.id}" value="${escapeHtml(p.nameAr)}"></div>
                            <div class="edit-field"><label>🌐 الاسم بالإنجليزية *</label><input type="text" id="editNameEn_${p.id}" value="${escapeHtml(p.nameEn)}"></div>
                            <div class="edit-field"><label>💰 السعر (ر.ع) *</label><input type="number" id="editPrice_${p.id}" value="${p.priceOMR}" step="0.5"></div>
                            <div class="edit-field"><label>🏷️ السعر القديم (اختياري)</label><input type="number" id="editOldPrice_${p.id}" value="${p.oldPrice || ''}" step="0.5"></div>
                            <div class="edit-field"><label>📦 الكمية المتوفرة</label><input type="number" id="editStock_${p.id}" value="${p.stock || 0}" step="1"></div>
                            <div class="edit-field"><label>🖼️ صورة المنتج</label>
                                <div class="edit-image-upload" onclick="document.getElementById('editImageFile_${p.id}').click()">
                                    <i class="fas fa-cloud-upload-alt"></i> اختر صورة من جهازك
                                    <input type="file" id="editImageFile_${p.id}" accept="image/*" style="display:none;">
                                </div>
                                <input type="text" id="editImageUrl_${p.id}" value="${escapeHtml(p.image || '')}" placeholder="أو أدخل رابط الصورة">
                                <img id="editImagePreview_${p.id}" class="edit-image-preview" src="${p.image || ''}" onerror="this.style.display='none'" style="${p.image ? 'display:block' : 'display:none'}">
                            </div>
                            <div class="edit-field"><label>📝 الوصف بالعربية</label><textarea id="editDescAr_${p.id}" rows="2">${escapeHtml(p.detailsAr || '')}</textarea></div>
                            <div class="edit-field"><label>📝 الوصف بالإنجليزية</label><textarea id="editDescEn_${p.id}" rows="2">${escapeHtml(p.detailsEn || '')}</textarea></div>
                            <div class="edit-field"><label>📂 التصنيف</label><select id="editCategory_${p.id}">${categories.map(cat => `<option value="${cat}" ${p.category === cat ? 'selected' : ''}>${categoryNames[cat]}</option>`).join('')}</select></div>
                            <div class="edit-buttons"><button onclick="saveEdit(${p.id})" style="background:#00cc88;">💾 حفظ التغييرات</button><button onclick="closeEditForm(${p.id})" style="background:#ff4444;">❌ إلغاء</button></div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
        
        products.forEach(p => {
            const editFileInput = document.getElementById(`editImageFile_${p.id}`);
            const editPreview = document.getElementById(`editImagePreview_${p.id}`);
            if (editFileInput) {
                editFileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) handleImageUpload(file, (data) => { editPreview.src = data; editPreview.style.display = "block"; window[`tempEditImage_${p.id}`] = data; });
                });
            }
        });
    }
    
    function handleImageUpload(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file, (data) => { currentImageData = data; preview.src = data; preview.style.display = "block"; });
        });
    }
    
    function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    function openEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'table-row'; }
    function closeEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'none'; }
    
    async function saveEdit(id) {
        const product = products.find(p => p.id == id);
        if (!product) return;
        product.nameAr = document.getElementById(`editNameAr_${id}`).value;
        product.nameEn = document.getElementById(`editNameEn_${id}`).value;
        product.priceOMR = parseFloat(document.getElementById(`editPrice_${id}`).value);
        product.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        product.stock = parseInt(document.getElementById(`editStock_${id}`).value) || 0;
        const tempImage = window[`tempEditImage_${id}`];
        if (tempImage) { product.image = tempImage; delete window[`tempEditImage_${id}`]; }
        else product.image = document.getElementById(`editImageUrl_${id}`).value;
        product.detailsAr = document.getElementById(`editDescAr_${id}`).value;
        product.detailsEn = document.getElementById(`editDescEn_${id}`).value;
        product.category = document.getElementById(`editCategory_${id}`).value;
        saveProducts();
        closeEditForm(id);
        alert('✅ تم التحديث');
        renderTable();
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id !== id);
            updateOrder();
            alert('✅ تم الحذف');
        }
    }
    
    async function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const image = currentImageData || "";
        const descAr = document.getElementById('newDesc').value.trim();
        const descEn = document.getElementById('newDescEn').value.trim();
        
        if (!nameAr || !nameEn || isNaN(price)) { alert('⚠️ يرجى ملء الاسم والسعر'); return; }
        
        const newProduct = { 
            id: Date.now(), 
            nameAr, 
            nameEn, 
            category, 
            priceOMR: price, 
            oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null, 
            stock, 
            image, 
            detailsAr: descAr, 
            detailsEn: descEn || descAr, 
            order: products.length 
        };
        
        products.push(newProduct);
        saveProducts();
        
        document.getElementById('newNameAr').value = ''; 
        document.getElementById('newNameEn').value = ''; 
        document.getElementById('newPrice').value = ''; 
        document.getElementById('newOldPrice').value = ''; 
        document.getElementById('newStock').value = '99'; 
        document.getElementById('newDesc').value = ''; 
        document.getElementById('newDescEn').value = ''; 
        currentImageData = null; 
        preview.style.display = 'none';
        
        alert('✅ تم إضافة المنتج');
        renderTable();
    }
    
    function loadCategories() {
        categoriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.categories && data.names) {
                categories = data.categories;
                categoryNames = data.names;
            } else {
                categories = ["games", "giftcards"];
                categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
                categoriesRef.set({ categories, names: categoryNames });
            }
            updateCategoriesUI();
            updateCategorySelect();
            updateFilterSelect();
        });
    }
    
    function updateCategoriesUI() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `
            <div class="category-badge">
                ${categoryNames[cat] || cat}
                <i class="fas fa-trash" onclick="deleteCategory('${cat}')"></i>
            </div>
        `).join('');
    }
    
    function updateCategorySelect() {
        const select = document.getElementById('newCategorySelect');
        if (select) {
            select.innerHTML = categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
        }
    }
    
    function updateFilterSelect() {
        const filterSelect = document.getElementById('filterCategory');
        if (filterSelect) {
            const currentValue = filterSelect.value;
            filterSelect.innerHTML = '<option value="all">الكل</option>';
            categories.forEach(cat => {
                filterSelect.innerHTML += `<option value="${cat}">${categoryNames[cat]}</option>`;
            });
            filterSelect.value = currentValue;
        }
    }
    
    function addNewCategory() {
        const newName = document.getElementById('newCategoryName').value.trim();
        if (!newName) { alert('الرجاء إدخال اسم التصنيف'); return; }
        const catKey = newName.replace(/\s/g, "_").toLowerCase();
        if (categories.includes(catKey)) { alert('هذا التصنيف موجود مسبقاً'); return; }
        categories.push(catKey);
        categoryNames[catKey] = newName;
        categoriesRef.set({ categories, names: categoryNames });
        updateCategoriesUI();
        updateCategorySelect();
        updateFilterSelect();
        document.getElementById('newCategoryName').value = '';
        alert('✅ تم إضافة التصنيف بنجاح!');
    }
    
    function deleteCategory(cat) {
        if (cat === "games" || cat === "giftcards") { alert("لا يمكن حذف التصنيفات الأساسية"); return; }
        if (confirm(`⚠️ هل أنت متأكد من حذف التصنيف "${categoryNames[cat]}"؟`)) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            categoriesRef.set({ categories, names: categoryNames });
            updateCategoriesUI();
            updateCategorySelect();
            updateFilterSelect();
            alert('✅ تم حذف التصنيف');
        }
    }
    
    function checkSession() {
        if (localStorage.getItem(SESSION_KEY) === "true") { isLoggedIn = true; showAdminPanel(); }
        else askPassword();
    }
    
    function askPassword() {
        const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
        if (pwd === ADMIN_PASSWORD) {
            isLoggedIn = true;
            localStorage.setItem(SESSION_KEY, "true");
            showAdminPanel();
        } else if (pwd !== null) { alert('❌ كلمة السر غير صحيحة'); window.location.href = 'index.html'; }
    }
    
    function showAdminPanel() {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('categoriesManager').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('deleteAllBtn').style.display = 'inline-block';
        loadProducts();
        loadCategories();
    }
    
    function logout() { localStorage.removeItem(SESSION_KEY); window.location.reload(); }
    function deleteAllProducts() { if (confirm('⚠️ حذف جميع المنتجات؟')) { productsRef.set([]); alert('تم الحذف'); renderTable(); } }
    
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('deleteAllBtn').onclick = deleteAllProducts;
    document.getElementById('addCategoryBtn').onclick = addNewCategory;
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderTable(); });
    document.getElementById('filterCategory').addEventListener('change', (e) => { filterCategory = e.target.value; renderTable(); });
    
    function toggleMode() {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        btn.innerHTML = document.body.classList.contains('light-mode') ? '🌞 نهاري' : '🌙 ليلي';
        localStorage.setItem('admin_mode', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    
    const savedMode = localStorage.getItem('admin_mode');
    if (savedMode === 'light') {
        document.body.classList.add('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        if (btn) btn.innerHTML = '🌞 نهاري';
    }
    
    window.updateStock = updateStock;
    window.moveProductUp = moveProductUp;
    window.moveProductDown = moveProductDown;
    window.moveProductToPosition = moveProductToPosition;
    window.openEditForm = openEditForm;
    window.closeEditForm = closeEditForm;
    window.saveEdit = saveEdit;
    window.deleteProduct = deleteProduct;
    window.addProduct = addProduct;
    window.deleteCategory = deleteCategory;
    window.addNewCategory = addNewCategory;
    window.toggleMode = toggleMode;
    
    checkSession();
</script>
</body>
</html>
