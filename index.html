<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Store PSN – إدارة المنتجات والتخفيضات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%);
      font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
      color: #f0f0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      text-align: center;
      background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
      padding: 1.5rem 1rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 170, 68, 0.3);
    }
    .header h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #ffaa44, #ffcc88);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header p { color: #ffdd99; font-size: 0.9rem; }
    
    /* Control Bar */
    .control-bar {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: rgba(15, 15, 42, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 170, 68, 0.2);
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px;
      border-radius: 40px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      color: #ccc;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .lang-btn.active { background: #ffaa44; color: #0a0a1a; }
    .currency-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px 12px;
      border-radius: 40px;
    }
    #currencySelect {
      background: #0a0c1a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 5px 10px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .user-badge {
      background: #1e1e3a;
      padding: 6px 14px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ffaa66;
      font-size: 0.8rem;
    }
    .login-btn, .logout-btn {
      background: #2d2f6e;
      border: none;
      color: #ffaa66;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    /* Admin Mode Indicator */
    .admin-mode-badge {
      background: #ffaa44;
      color: #0a0a1a;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    
    /* Search */
    .search-bar-container {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.8);
      padding: 8px 20px;
      border-radius: 50px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e3a;
      padding: 5px 15px;
      border-radius: 40px;
    }
    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      color: white;
      outline: none;
    }
    .search-results-count {
      background: #2d2f6e;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #ffaa66;
    }
    
    /* Tabs */
    .tabs-container {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab-btn {
      background: #1e1e3a;
      border: 1px solid rgba(255, 170, 68, 0.3);
      padding: 8px 20px;
      border-radius: 40px;
      color: #ffdd99;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .tab-btn.active { background: #ffaa44; color: #0a0a1a; }
    
    /* Products Grid */
    .products-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .product-card {
      background: #11152b;
      border-radius: 1rem;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid rgba(255, 170, 68, 0.2);
      position: relative;
    }
    .product-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
    .discount-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #ff4444;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      z-index: 2;
    }
    .timer-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #ffaa44;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.6rem;
      z-index: 2;
    }
    .product-image {
      width: 100%;
      height: 160px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
    }
    .product-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      color: #ffcc77;
    }
    .card-info { padding: 0.8rem; }
    .product-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .product-category { font-size: 0.6rem; color: #ffaa66; margin-bottom: 6px; text-align: center; }
    .product-details {
      background: rgba(0, 0, 0, 0.3);
      padding: 6px;
      border-radius: 10px;
      margin: 8px 0;
      font-size: 0.65rem;
      color: #b9c5f0;
      border-right: 2px solid #ffaa44;
    }
    .price-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 6px 0;
    }
    .old-price { font-size: 0.8rem; color: #888; text-decoration: line-through; }
    .price { font-size: 1.2rem; font-weight: 800; color: #ffaa44; }
    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #25D366;
      color: #000;
      width: 100%;
      padding: 8px 0;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 6px;
      font-size: 0.8rem;
    }
    
    /* Admin Edit Section - لكل منتج */
    .admin-edit-section {
      background: #0a0c1a;
      border-top: 1px solid #2a2f55;
      padding: 0.8rem;
      margin-top: 0.5rem;
    }
    .admin-edit-section h4 {
      font-size: 0.7rem;
      color: #ffaa66;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .edit-price-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .edit-price-row input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 6px 10px;
      width: 90px;
      color: white;
      text-align: center;
    }
    .discount-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .discount-buttons button {
      background: #2d2f6e;
      border: none;
      padding: 4px 10px;
      border-radius: 30px;
      color: #ffaa66;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .discount-buttons button.active { background: #ffaa44; color: #0a0a1a; }
    .custom-discount-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .custom-discount-row input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 5px 8px;
      width: 70px;
      color: white;
    }
    .timer-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .timer-row input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 6px 10px;
      flex: 1;
      color: white;
      font-size: 0.7rem;
    }
    .save-edit-btn {
      background: #00cc88;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 0.75rem;
    }
    .delete-product-btn {
      background: #ff4444;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 6px;
      font-size: 0.75rem;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .page-btn {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .page-btn.active { background: #ffaa44; color: #0a0a1a; }
    .footer { text-align: center; margin-top: 2rem; padding: 1rem; color: #6f7bb3; font-size: 0.7rem; border-top: 1px solid rgba(255, 170, 68, 0.2); }
    
    @media (max-width: 640px) { body { padding: 1rem; } .product-image { height: 140px; } .products-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body dir="rtl">

<div class="header">
  <h1>🛒 Store PSN</h1>
  <p id="welcomeMsg">ألعاب PS4 / PS5 – بطاقات شحن – عروض وتخفيضات – رصيد فوري</p>
</div>

<div class="control-bar">
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="ar">🇸🇦 العربية</button>
    <button class="lang-btn" data-lang="en">🇬🇧 English</button>
  </div>
  <div class="currency-selector">
    <label><i class="fas fa-coins"></i> <span id="currencyLabel">العملة:</span></label>
    <select id="currencySelect">
      <option value="OMR">ريال عماني (OMR)</option>
      <option value="USD">دولار أمريكي (USD)</option>
      <option value="SAR">ريال سعودي (SAR)</option>
      <option value="QAR">ريال قطري (QAR)</option>
      <option value="EUR">يورو (EUR)</option>
      <option value="AED">درهم إماراتي (AED)</option>
    </select>
  </div>
  <div class="auth-buttons" id="authButtons">
    <button class="login-btn" id="showLoginBtn"><i class="fas fa-user-shield"></i> <span id="loginBtnText">تسجيل دخول</span></button>
  </div>
</div>

<div class="search-bar-container">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
    <span class="search-results-count" id="searchCount">0</span>
  </div>
</div>

<div class="tabs-container">
  <button class="tab-btn active" data-category="games">🎮 ألعاب PS4/PS5</button>
  <button class="tab-btn" data-category="giftcards">💳 بطاقات شحن</button>
  <button class="tab-btn" data-category="offers">🔥 عروض وتخفيضات</button>
</div>

<div id="productsContainer" class="products-grid"></div>
<div class="pagination" id="paginationContainer"></div>

<div class="footer">
  <i class="fas fa-bolt"></i> Store PSN - أسرع متجر للألعاب وبطاقات الشحن
</div>

<script>
  // ==================== البيانات ====================
  let products = [];
  let nextId = 1;
  let currentUser = { type: "guest", name: "زائر" };
  let currentLang = "ar";
  let currentCurrency = "OMR";
  let currentPage = 1;
  let currentCategory = "games";
  let searchQuery = "";
  const ITEMS_PER_PAGE = 6;
  const ADMIN_PASSWORD = "admin123";
  
  const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, QAR: 9.46, EUR: 2.4, AED: 9.55 };
  const currencySymbols = { OMR: "ر.ع", USD: "$", SAR: "ر.س", QAR: "ر.ق", EUR: "€", AED: "د.إ" };
  const WA_NUMBER = "96879977100";
  
  const categoryColors = { games: "#2d4a6e", giftcards: "#1a3a5a" };
  const categoryIcons = { games: "🎮", giftcards: "💳" };
  
  // تحميل وحفظ البيانات
  function saveToLocal() { localStorage.setItem("store_psn_products", JSON.stringify(products)); }
  function loadFromLocal() {
    const saved = localStorage.getItem("store_psn_products");
    if (saved) {
      products = JSON.parse(saved);
      nextId = Math.max(...products.map(p => p.id), 0) + 1;
    } else {
      products = [
        { id: 1, nameAr: "Assassin's Creed Shadows", nameEn: "Assassin's Creed Shadows", category: "games", priceOMR: 14, oldPrice: 20, image: "https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/3159340/header.jpg", detailsAr: "🏷️ الحجم: 65GB | 🎮 اللغة: عربية/إنجليزية", detailsEn: "📦 Size: 65GB | 🎮 Language: Arabic/English", timer: null, msgAr: "أريد Assassin's Creed Shadows", msgEn: "I want Assassin's Creed Shadows" },
        { id: 2, nameAr: "Call of Duty: Black Ops 6", nameEn: "Call of Duty: Black Ops 6", category: "games", priceOMR: 22, oldPrice: 30, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2933620/header.jpg", detailsAr: "🏷️ الحجم: 120GB | 🎮 اللغة: إنجليزية", detailsEn: "📦 Size: 120GB | 🎮 Language: English", timer: null, msgAr: "أريد Call of Duty Black Ops 6", msgEn: "I want Call of Duty Black Ops 6" },
        { id: 3, nameAr: "Grand Theft Auto VI", nameEn: "Grand Theft Auto VI", category: "games", priceOMR: 6, oldPrice: 10, image: "https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/downloads/gtavi/gtavi_cover_ps5.jpg", detailsAr: "🏷️ الحجم: 150GB | 🌍 عالم مفتوح", detailsEn: "📦 Size: 150GB | 🌍 Open World", timer: null, msgAr: "أريد GTA VI PS5", msgEn: "I want GTA VI PS5" },
        { id: 4, nameAr: "حساب Plus سنة", nameEn: "PS Plus Year", category: "giftcards", priceOMR: 23, oldPrice: 11.5, image: "", detailsAr: "اشتراك لمدة سنة | 12 Months Card", detailsEn: "12 Months Subscription", timer: null, msgAr: "أريد حساب Plus سنة", msgEn: "I want PS Plus Year", icon: "🎮" },
        { id: 5, nameAr: "PSN 20$", nameEn: "PSN 20$", category: "giftcards", priceOMR: 7.7, oldPrice: 10, image: "", detailsAr: "بطاقة شحن أمريكي", detailsEn: "US Gift Card", timer: null, msgAr: "أريد PSN 20$", msgEn: "I want PSN 20$", icon: "💳" },
        { id: 6, nameAr: "بطاقة شحن عماني", nameEn: "Oman Gift Card", category: "giftcards", priceOMR: 5, oldPrice: 6, image: "", detailsAr: "الفئات: 5ر.ع | 10ر.ع | 20ر.ع | 50ر.ع", detailsEn: "Values: 5 OMR | 10 OMR | 20 OMR | 50 OMR", timer: null, msgAr: "أريد بطاقة شحن عماني", msgEn: "I want Oman Gift Card", icon: "🇴🇲" }
      ];
      nextId = 7;
      saveToLocal();
    }
  }
  loadFromLocal();
  
  function convertPrice(price) { return (price * exchangeRates[currentCurrency]).toFixed(2); }
  function calcDiscount(oldPrice, newPrice) { if (!oldPrice || oldPrice <= newPrice) return 0; return Math.round((1 - newPrice / oldPrice) * 100); }
  function getRemainingTime(timer) {
    if (!timer) return null;
    const end = new Date(timer);
    const now = new Date();
    const diff = end - now;
    if (diff <= 0) return "انتهى";
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    if (days > 0) return `${days} يوم ${hours} ساعة`;
    return `${hours} ساعة`;
  }
  
  function getFilteredProducts() {
    let filtered = [...products];
    const query = searchQuery.trim().toLowerCase();
    if (query) filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(query) || p.nameEn.toLowerCase().includes(query));
    if (currentCategory === "offers") filtered = filtered.filter(p => p.oldPrice && p.oldPrice > p.priceOMR);
    else filtered = filtered.filter(p => p.category === currentCategory);
    return filtered;
  }
  
  // بناء بطاقة المنتج مع قسم التعديل للأدمن
  function buildProductCard(p) {
    const card = document.createElement("div");
    card.className = "product-card";
    const name = currentLang === "ar" ? p.nameAr : p.nameEn;
    const details = currentLang === "ar" ? p.detailsAr : p.detailsEn;
    const msg = currentLang === "ar" ? p.msgAr : p.msgEn;
    const price = convertPrice(p.priceOMR);
    const sym = currencySymbols[currentCurrency];
    const hasDiscount = p.oldPrice && p.oldPrice > p.priceOMR;
    const oldPrice = hasDiscount ? convertPrice(p.oldPrice) : null;
    const discountPercent = hasDiscount ? calcDiscount(p.oldPrice, p.priceOMR) : 0;
    const remaining = getRemainingTime(p.timer);
    const categoryName = p.category === "games" ? (currentLang === "ar" ? "لعبة" : "Game") : (currentLang === "ar" ? "بطاقة شحن" : "Gift Card");
    const bgColor = categoryColors[p.category] || "#2d4a6e";
    const icon = p.icon || categoryIcons[p.category] || "🎮";
    
    let imgHtml = "";
    if (p.image && p.image.trim()) {
      imgHtml = `<div class="product-image" style="background-image: url('${p.image}');"><div class="product-badge">${categoryName}</div></div>`;
    } else {
      imgHtml = `<div class="product-image" style="background: linear-gradient(135deg, ${bgColor}, ${bgColor}cc);"><div style="font-size: 2.5rem;">${icon}</div><div class="product-badge">${categoryName}</div></div>`;
    }
    
    card.innerHTML = `
      ${hasDiscount ? `<div class="discount-badge">🔥 خصم ${discountPercent}%</div>` : ''}
      ${remaining ? `<div class="timer-badge">⏱️ ${remaining}</div>` : ''}
      ${imgHtml}
      <div class="card-info">
        <div class="product-title">${name}</div>
        <div class="product-category">${categoryName}</div>
        ${details ? `<div class="product-details"><i class="fas fa-info-circle"></i> ${details}</div>` : ''}
        <div class="price-container">
          ${hasDiscount ? `<span class="old-price">${oldPrice} ${sym}</span>` : ''}
          <span class="price">${price} ${sym}</span>
        </div>
        <a href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${currentLang === "ar" ? "اطلب الآن" : "Order Now"}</a>
      </div>
    `;
    
    // إذا كان المستخدم أدمن، أضف قسم التعديل
    if (currentUser.type === "admin") {
      const editSection = document.createElement("div");
      editSection.className = "admin-edit-section";
      editSection.innerHTML = `
        <h4><i class="fas fa-edit"></i> ${currentLang === "ar" ? "تعديل المنتج" : "Edit Product"}</h4>
        <div class="edit-price-row">
          <span style="font-size:0.7rem;">${currentLang === "ar" ? "السعر:" : "Price:"}</span>
          <input type="number" id="edit-price-${p.id}" value="${p.priceOMR}" step="0.5" style="width:90px;">
          <span>ر.ع</span>
        </div>
        <div class="discount-buttons">
          <button data-discount="30" data-id="${p.id}">30%</button>
          <button data-discount="20" data-id="${p.id}">20%</button>
          <button data-discount="10" data-id="${p.id}">10%</button>
          <button data-discount="0" data-id="${p.id}">0%</button>
        </div>
        <div class="custom-discount-row">
          <span style="font-size:0.7rem;">${currentLang === "ar" ? "نسبة مخصصة:" : "Custom:"}</span>
          <input type="number" id="custom-discount-${p.id}" step="1" min="0" max="100" placeholder="%" style="width:70px;">
          <button class="apply-discount-btn" data-id="${p.id}" style="background:#ffaa44; border:none; padding:4px 10px; border-radius:20px; cursor:pointer; font-size:0.7rem;">${currentLang === "ar" ? "تطبيق" : "Apply"}</button>
        </div>
        <div class="timer-row">
          <span style="font-size:0.7rem;">⏱️ ${currentLang === "ar" ? "عداد تنازلي:" : "Timer:"}</span>
          <input type="datetime-local" id="edit-timer-${p.id}" value="${p.timer ? p.timer.slice(0, 16) : ''}">
        </div>
        <button class="save-edit-btn" data-id="${p.id}"><i class="fas fa-save"></i> ${currentLang === "ar" ? "حفظ التعديلات" : "Save Changes"}</button>
        <button class="delete-product-btn" data-id="${p.id}"><i class="fas fa-trash"></i> ${currentLang === "ar" ? "حذف المنتج" : "Delete Product"}</button>
      `;
      card.appendChild(editSection);
      
      // ربط الأحداث
      editSection.querySelectorAll(".discount-buttons button").forEach(btn => {
        btn.addEventListener("click", () => {
          const discount = parseInt(btn.getAttribute("data-discount"));
          const priceInput = document.getElementById(`edit-price-${p.id}`);
          const currentPrice = parseFloat(priceInput.value);
          if (!isNaN(currentPrice) && currentPrice > 0) {
            const newOldPrice = currentPrice / (1 - discount / 100);
            document.getElementById(`custom-discount-${p.id}`).value = discount;
            alert(`${currentLang === "ar" ? "سيتم تطبيق خصم" : "Applying"} ${discount}%: ${currentLang === "ar" ? "السعر القديم سيكون" : "old price will be"} ${newOldPrice.toFixed(2)} ر.ع`);
          }
        });
      });
      
      editSection.querySelector(".apply-discount-btn")?.addEventListener("click", () => {
        const discount = parseFloat(document.getElementById(`custom-discount-${p.id}`).value);
        const priceInput = document.getElementById(`edit-price-${p.id}`);
        const currentPrice = parseFloat(priceInput.value);
        if (!isNaN(discount) && !isNaN(currentPrice) && currentPrice > 0) {
          const newOldPrice = currentPrice / (1 - discount / 100);
          alert(`${currentLang === "ar" ? "سيتم تطبيق خصم" : "Applying"} ${discount}%: ${currentLang === "ar" ? "السعر القديم سيكون" : "old price will be"} ${newOldPrice.toFixed(2)} ر.ع`);
        }
      });
      
      editSection.querySelector(".save-edit-btn")?.addEventListener("click", () => {
        const newPrice = parseFloat(document.getElementById(`edit-price-${p.id}`).value);
        const customDiscount = parseFloat(document.getElementById(`custom-discount-${p.id}`).value);
        const newTimer = document.getElementById(`edit-timer-${p.id}`).value || null;
        if (!isNaN(newPrice)) {
          p.priceOMR = newPrice;
          if (!isNaN(customDiscount) && customDiscount > 0) {
            p.oldPrice = newPrice / (1 - customDiscount / 100);
          } else if (customDiscount === 0) {
            p.oldPrice = null;
          }
          p.timer = newTimer;
          saveToLocal();
          renderProducts();
        }
      });
      
      editSection.querySelector(".delete-product-btn")?.addEventListener("click", () => {
        if (confirm(currentLang === "ar" ? "هل أنت متأكد من حذف هذا المنتج؟" : "Are you sure you want to delete this product?")) {
          products = products.filter(x => x.id !== p.id);
          saveToLocal();
          renderProducts();
        }
      });
    }
    
    return card;
  }
  
  function renderProducts() {
    const container = document.getElementById("productsContainer");
    if (!container) return;
    container.innerHTML = "";
    const filtered = getFilteredProducts();
    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    filtered.slice(start, start + ITEMS_PER_PAGE).forEach(p => container.appendChild(buildProductCard(p)));
    const pagContainer = document.getElementById("paginationContainer");
    if (pagContainer) {
      pagContainer.innerHTML = "";
      if (totalPages > 1) {
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.className = "page-btn" + (i === currentPage ? " active" : "");
          btn.textContent = i;
          btn.onclick = () => { currentPage = i; renderProducts(); };
          pagContainer.appendChild(btn);
        }
      }
    }
    document.getElementById("searchCount").innerHTML = filtered.length;
  }
  
  // تسجيل الدخول
  function updateUIForUser() {
    const authDiv = document.getElementById("authButtons");
    const welcomeMsg = document.getElementById("welcomeMsg");
    if (currentUser.type === "admin") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-crown"></i> ${currentLang === "ar" ? "مرحباً Admin - وضع التعديل نشط" : "Welcome Admin - Edit Mode Active"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🛒 مرحباً بك أيها المدير! يمكنك تعديل أي منتج مباشرة من بطاقته" : "🛒 Welcome Admin! You can edit any product directly from its card";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else {
      authDiv.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user-shield"></i> <span id="loginBtnText">${currentLang === "ar" ? "تسجيل دخول" : "Login"}</span></button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🛒 Store PSN - ألعاب PS4/PS5 – بطاقات شحن – عروض وتخفيضات – رصيد فوري" : "🛒 Store PSN - PS4/PS5 Games – Gift Cards – Offers & Discounts – Instant Credit";
      document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
    }
    renderProducts();
  }
  
  function logout() { currentUser = { type: "guest", name: "زائر" }; updateUIForUser(); }
  
  // نافذة تسجيل الدخول
  function showLoginModal() { document.getElementById("loginModal").style.display = "flex"; }
  function closeLoginModal() { document.getElementById("loginModal").style.display = "none"; document.getElementById("loginError").innerHTML = ""; }
  function handleLogin() {
    const type = document.getElementById("loginUserType").value;
    if (type === "admin") {
      const pwd = document.getElementById("adminPasswordInput").value;
      if (pwd === ADMIN_PASSWORD) { currentUser = { type: "admin", name: "Admin" }; updateUIForUser(); closeLoginModal(); }
      else document.getElementById("loginError").innerHTML = "❌ كلمة السر غير صحيحة";
    } else { currentUser = { type: "user", name: "User" }; updateUIForUser(); closeLoginModal(); }
  }
  
  // الأحداث
  function initEvents() {
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.getAttribute("data-lang");
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
        updateUIForUser();
        document.getElementById("currencyLabel").innerText = currentLang === "ar" ? "العملة:" : "Currency:";
        document.getElementById("loginBtnText").innerText = currentLang === "ar" ? "تسجيل دخول" : "Login";
      });
    });
    document.getElementById("currencySelect")?.addEventListener("change", (e) => { currentCurrency = e.target.value; renderProducts(); });
    document.getElementById("searchInput")?.addEventListener("input", (e) => { searchQuery = e.target.value; currentPage = 1; renderProducts(); });
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentCategory = btn.getAttribute("data-category");
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentPage = 1;
        renderProducts();
      });
    });
  }
  
  // إضافة نافذة تسجيل الدخول
  const loginModalHtml = `
  <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:2000;">
    <div style="background:#11152b; border-radius:1.5rem; padding:2rem; text-align:center; border:2px solid #ffaa44; width:320px;">
      <i class="fas fa-user-shield" style="font-size:3rem; color:#ffaa44;"></i>
      <h3 style="color:#ffaa44; margin:1rem 0;">${currentLang === "ar" ? "تسجيل الدخول" : "Login"}</h3>
      <select id="loginUserType" style="width:100%; padding:10px; margin:10px 0; border-radius:40px; background:#1e1e3a; color:white; border:1px solid #ffaa44;">
        <option value="user">👤 ${currentLang === "ar" ? "عميل / زائر" : "User / Guest"}</option>
        <option value="admin">👑 ${currentLang === "ar" ? "أدمن (مدير)" : "Admin"}</option>
      </select>
      <div id="adminPasswordDiv" style="display:none;">
        <input type="password" id="adminPasswordInput" placeholder="${currentLang === "ar" ? "كلمة السر" : "Password"}" style="width:100%; padding:10px; margin:10px 0; border-radius:40px; background:#1e1e3a; color:white; border:1px solid #ffaa44;">
      </div>
      <button id="loginSubmit" style="background:#ffaa44; border:none; padding:10px; border-radius:40px; width:100%; margin-top:10px; cursor:pointer;">${currentLang === "ar" ? "دخول" : "Login"}</button>
      <div id="loginError" style="color:#ff6666; margin-top:10px;"></div>
      <button id="closeLoginModal" style="background:#444; border:none; padding:8px; border-radius:40px; width:100%; margin-top:10px; cursor:pointer;">${currentLang === "ar" ? "إغلاق" : "Close"}</button>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", loginModalHtml);
  
  document.getElementById("closeLoginModal")?.addEventListener("click", closeLoginModal);
  document.getElementById("loginSubmit")?.addEventListener("click", handleLogin);
  document.getElementById("loginUserType")?.addEventListener("change", (e) => {
    document.getElementById("adminPasswordDiv").style.display = e.target.value === "admin" ? "block" : "none";
  });
  
  initEvents();
  updateUIForUser();
</script>
</body>
</html>
